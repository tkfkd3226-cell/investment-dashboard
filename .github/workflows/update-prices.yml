name: Update KRX closing prices

on:
  workflow_dispatch:
    inputs:
      date:
        description: "YYYY-MM-DD. 비워두면 한국시간 오늘"
        required: false
        type: string
  schedule:
    # 종가 반영: KST 17:45
    - cron: "45 8 * * 1-5"

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update prices and snapshots
        env:
          INPUT_DATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.date || '' }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python scripts/update_prices.py --date "$INPUT_DATE"
          else
            python scripts/update_prices.py
          fi

      - name: Commit updated data
        run: |
          if git diff --quiet data/prices.json data/performance_snapshots.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/performance_snapshots.json
          git commit -m "Update KRX prices and performance snapshots"
          git push
