<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>투자 성과 대시보드</title>
<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --ink:#172033;
  --muted:#6b7280;
  --line:#d7dce5;
  --blue:#1f5eff;
  --green:#16a34a;
  --red:#dc2626;
  --amber:#d97706;
  --navy:#0f172a;
  --soft-blue:#eaf2ff;
  --soft-green:#eaf7ee;
  --soft-red:#fff1f1;
  --soft-amber:#fff7e6;
  --soft-purple:#f4efff;
  --soft-gray:#eef1f5;
  --black:#111827;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.45;
}

.wrap{
  max-width:1680px;
  margin:0 auto;
  padding:24px;
}

.hero{
  background:linear-gradient(135deg,#111827 0%,#1f2937 50%,#0f172a 100%);
  color:#fff;
  border-radius:22px;
  padding:28px 30px;
  box-shadow:0 16px 40px rgba(15,23,42,.22);
  position:relative;
  overflow:hidden;
}

.hero:after{
  content:"";
  position:absolute;
  right:-110px;
  top:-80px;
  width:330px;
  height:330px;
  border-radius:999px;
  background:rgba(59,130,246,.25);
}

.hero h1{
  margin:0 0 8px;
  font-size:30px;
  letter-spacing:-.04em;
}

.hero p{
  margin:0;
  color:#d1d5db;
  font-size:15px;
}

.grid{
  display:grid;
  gap:16px;
}

.cards{
  grid-template-columns:repeat(4,minmax(0,1fr));
  margin-top:18px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
}

.card.dark{
  background:#111827;
  color:white;
  border-color:#111827;
}

.label{
  font-size:13px;
  color:var(--muted);
  font-weight:700;
  margin-bottom:7px;
}

.dark .label{
  color:#cbd5e1;
}

.value{
  font-size:28px;
  font-weight:900;
  letter-spacing:-.04em;
}

.sub{
  font-size:13px;
  color:var(--muted);
  margin-top:5px;
}

.dark .sub{
  color:#cbd5e1;
}

.positive{
  color:var(--green) !important;
}

.negative{
  color:var(--red) !important;
}

.blue{
  color:var(--blue) !important;
}

section{
  margin-top:22px;
}

.section-title{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin:0 0 12px;
}

.section-title h2{
  margin:0;
  font-size:22px;
  letter-spacing:-.04em;
}

.section-title p{
  margin:0;
  color:var(--muted);
  font-size:13px;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:13px;
  background:white;
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
}

th, td{
  padding:9px 10px;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  vertical-align:middle;
}

th:last-child, td:last-child{
  border-right:0;
}

tr:last-child td{
  border-bottom:0;
}

thead th{
  background:#f1f5f9;
  color:#111827;
  font-weight:900;
  text-align:center;
  white-space:nowrap;
}

td.num{
  text-align:right;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}

.small{
  font-size:12px;
  color:var(--muted);
}

.ticker-samsung{
  background:#fff3d0;
}

.ticker-sk{
  background:#ffe3e3;
}

.ticker-hyundai{
  background:#e3f2ff;
}

.ticker-kodex{
  background:#e9f7e9;
}

.ticker-mini{
  background:#f0f2f5;
}

.summary-row td{
  background:#f8fafc;
  font-weight:900;
}

.hold-row td{
  font-weight:800;
}

.note{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
}

.note strong{
  color:#111827;
}

.three{
  grid-template-columns:repeat(3,minmax(0,1fr));
}

.pillbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}

.pill{
  padding:7px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  font-size:13px;
  color:#f3f4f6;
}

.mobile-scroll{
  overflow:auto;
  border-radius:16px;
}

.mobile-scroll table{
  min-width:980px;
}

.kpi-mini{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:10px;
}

.mini-card{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}

.mini-card .m-label{
  font-size:12px;
  color:var(--muted);
  font-weight:800;
}

.mini-card .m-value{
  font-size:19px;
  font-weight:900;
  margin-top:2px;
}

.formula{
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  background:#0f172a;
  color:#e5e7eb;
  border-radius:12px;
  padding:12px;
  overflow:auto;
  font-size:12px;
}

.pension-band{
  background:linear-gradient(135deg,#ecfdf5 0%,#eff6ff 52%,#fff7ed 100%);
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
}

.bar-box{
  height:12px;
  background:#eef2f7;
  border-radius:999px;
  overflow:hidden;
  border:1px solid #dbe2ec;
}

.bar-fill{
  height:100%;
  border-radius:999px;
}

.bar-green{
  background:#22c55e;
}

.bar-blue{
  background:#3b82f6;
}

.bar-amber{
  background:#f59e0b;
}

.bar-gray{
  background:#94a3b8;
}

.chart-hover-line{
  pointer-events:none;
}

.svg-hitbox{
  fill:transparent;
  cursor:crosshair;
}

.dash-tooltip{
  position:fixed;
  z-index:9999;
  min-width:210px;
  max-width:320px;
  background:rgba(15,23,42,.96);
  color:#fff;
  border:1px solid rgba(255,255,255,.16);
  border-radius:12px;
  padding:10px 12px;
  box-shadow:0 16px 36px rgba(0,0,0,.28);
  font-size:12px;
  line-height:1.5;
  pointer-events:none;
  opacity:0;
  transform:translate(-50%,-110%);
  transition:opacity .08s ease;
}

.dash-tooltip.visible{
  opacity:1;
}

.dash-tooltip .tt-date{
  font-weight:900;
  font-size:13px;
  margin-bottom:6px;
  color:#fff;
}

.dash-tooltip .tt-row{
  display:flex;
  justify-content:space-between;
  gap:16px;
  white-space:nowrap;
}

.dash-tooltip .tt-name{
  color:#cbd5e1;
}

.dash-tooltip .tt-val{
  font-weight:800;
  color:#fff;
}

.dash-tooltip .tt-pos{
  color:#86efac;
}

.dash-tooltip .tt-neg{
  color:#fca5a5;
}

.chart-grid{
  grid-template-columns:1fr;
  gap:18px;
}

.chart-card{
  position:relative;
  overflow:hidden;
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
}

.chart-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}

.chart-head h3{
  margin:0;
  font-size:18px;
  letter-spacing:-.03em;
}

.chart-head p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:12px;
}

.chart-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}

svg.chart{
  width:100%;
  min-width:960px;
  height:330px;
  display:block;
  background:#fff;
  border-radius:12px;
}

.chart-legend{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:10px;
  font-size:12px;
  color:#555;
}

.legend-item{
  display:inline-flex;
  align-items:center;
  gap:5px;
}

.swatch{
  width:12px;
  height:12px;
  border-radius:3px;
  display:inline-block;
}

.chart-note{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
  width:100%;
  min-width:0;
  margin-top:12px;
}

.chart-note .mini-card{
  background:#f8fafc;
}

@media (max-width:900px){
  .chart-note{
    grid-template-columns:1fr 1fr;
  }
}

@media (max-width:1100px){
  .cards, .three, .two{
    grid-template-columns:1fr;
  }

  .value{
    font-size:24px;
  }

  .wrap{
    padding:14px;
  }
}

@media print{
  body{
    background:white;
  }

  .card, .note, .hero, table{
    box-shadow:none;
  }

  .wrap{
    max-width:none;
    padding:8px;
  }
}

.two{
  grid-template-columns:minmax(0,1.1fr) minmax(0,.9fr);
  width:100%;
}

.two > *, .pension-detail-grid > *, .chart-card, .chart-wrap{
  min-width:0;
}

.pension-detail-grid{
  width:100%;
  align-items:stretch;
}

.pension-detail-grid .note{
  width:100%;
  height:100%;
}

.pension-detail-grid .mobile-scroll{
  width:100%;
  min-width:0;
}

.pension-change-note{
  overflow:hidden;
}

.change-kpis{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:10px;
}

.change-table-wrap{
  width:100%;
  overflow-x:auto;
  border-radius:12px;
  margin-top:12px;
  -webkit-overflow-scrolling:touch;
}

.change-table{
  min-width:0 !important;
  table-layout:fixed;
  font-size:12px !important;
  margin:0 !important;
  border-radius:12px !important;
}

.change-table th:nth-child(1){
  width:25%;
}

.change-table th:nth-child(2), .change-table th:nth-child(3){
  width:28%;
}

.change-table th:nth-child(4){
  width:19%;
}

.change-price{
  display:block;
  font-weight:800;
  white-space:nowrap;
}

.change-eval{
  display:block;
  margin-top:2px;
  color:var(--muted);
  font-size:11px;
  white-space:nowrap;
}

.change-mobile-list{
  display:none;
}

.change-product-card{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:14px;
  padding:13px;
}

.change-product-title{
  font-size:14px;
  font-weight:900;
  margin-bottom:9px;
  color:#111827;
}

.change-product-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  padding:5px 0;
  border-top:1px dashed #dbe2ec;
  font-size:12px;
}

.change-product-row:first-of-type{
  border-top:0;
}

.change-product-label{
  color:var(--muted);
  font-weight:700;
}

.change-product-value{
  text-align:right;
  font-weight:800;
  font-variant-numeric:tabular-nums;
}

@media (max-width:1100px){
  .pension-detail-grid{
    grid-template-columns:1fr;
  }
}

@media (max-width:700px){
  .change-kpis{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .desktop-change-table{
    display:none;
  }

  .change-mobile-list{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-top:12px;
  }

  .chart-note{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .chart-note .mini-card{
    min-width:0;
  }

  .chart-note .m-value{
    overflow-wrap:anywhere;
  }

  svg.chart{
    min-width:760px;
  }
}

@media (max-width:420px){
  .change-kpis{
    grid-template-columns:1fr;
  }

  .chart-note{
    grid-template-columns:1fr;
  }

  .mini-card .m-value{
    font-size:18px;
  }
}

.result-summary-grid{
  grid-template-columns:repeat(auto-fit,minmax(min(100%,520px),1fr)) !important;
  align-items:stretch;
}

.result-summary-grid > .note{
  min-width:0;
  width:100%;
}

.result-summary-grid .kpi-mini, .result-summary-grid .mini-card{
  min-width:0;
}

.result-summary-grid .m-value{
  word-break:keep-all;
  overflow-wrap:normal;
  font-variant-numeric:tabular-nums;
}

@media (max-width:520px){
  .result-summary-grid{
    grid-template-columns:1fr !important;
  }

  .result-summary-grid .kpi-mini{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .result-summary-grid .m-value{
    font-size:clamp(16px,4.5vw,19px);
  }
}

@media (min-width:1101px) and (max-width:1250px){
  .pension-detail-grid{
    grid-template-columns:1fr !important;
  }

  .pension-products-note .mobile-scroll table{
    min-width:0 !important;
    width:100% !important;
  }
}

.scroll-hint{
  display:none;
}

.mobile-scroll.is-scrollable, .chart-wrap.is-scrollable{
  box-shadow:inset -20px 0 18px -22px rgba(15,23,42,.8);
}

@media (max-width:900px){
  .scroll-hint{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:6px;
    margin:0 2px 7px;
    color:#475569;
    font-size:12px;
    font-weight:800;
  }

  .scroll-hint::before{
    content:"↔";
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:24px;
    height:24px;
    border-radius:999px;
    background:#e2e8f0;
    color:#0f172a;
    font-size:14px;
  }

  .mobile-scroll.is-scrollable, .chart-wrap.is-scrollable{
    border-right:3px solid #94a3b8;
  }
}

.symbol-summary-grid .mini-card{
  padding:14px;
}

.symbol-summary-grid .m-value{
  margin-top:4px;
  margin-bottom:10px;
  white-space:nowrap;
}

.symbol-metrics{
  display:grid;
  gap:6px;
  padding-top:9px;
  border-top:1px solid var(--line);
}

.symbol-metric{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  min-width:0;
}

.symbol-metric-label{
  color:var(--muted);
  font-size:11px;
  font-weight:800;
}

.symbol-metric-value{
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
}

.symbol-summary-note{
  margin-top:8px;
  color:var(--muted);
  font-size:11px;
}

@media (max-width:520px){
  .symbol-metric{
    align-items:flex-start;
    flex-direction:column;
    gap:1px;
  }
}

.change-table tbody td:nth-child(4){
  text-align:right !important;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
}

@media (max-width:900px){
  .combined-performance-table, .account-summary-table{
    width:max-content !important;
    min-width:max-content !important;
    table-layout:auto !important;
    font-size:12px !important;
  }

  .combined-performance-table th, .combined-performance-table td, .account-summary-table th, .account-summary-table td{
    padding:7px 8px !important;
    white-space:nowrap;
  }

  .combined-performance-table th:first-child, .combined-performance-table td:first-child{
    min-width:112px;
  }

  .account-summary-table th:last-child, .account-summary-table td:last-child{
    min-width:165px;
    max-width:210px;
    white-space:normal;
    line-height:1.4;
  }
}

@media (max-width:900px){
  .pension-products-table{
    width:max-content !important;
    min-width:max-content !important;
    table-layout:auto !important;
    font-size:11px !important;
  }

  .pension-products-table th, .pension-products-table td{
    padding:6px 7px !important;
    white-space:nowrap !important;
  }

  .pension-products-table th:nth-child(2), .pension-products-table td:nth-child(2){
    min-width:42px !important;
  }

  .pension-products-table th:nth-child(3), .pension-products-table td:nth-child(3){
    min-width:68px !important;
  }

  .pension-products-table th:nth-child(4), .pension-products-table td:nth-child(4), .pension-products-table th:nth-child(5), .pension-products-table td:nth-child(5), .pension-products-table th:nth-child(6), .pension-products-table td:nth-child(6){
    min-width:88px !important;
  }

  .pension-products-table th:nth-child(7), .pension-products-table td:nth-child(7){
    min-width:62px !important;
  }

  .pension-products-table th:nth-child(8), .pension-products-table td:nth-child(8){
    min-width:78px !important;
  }

  .pension-products-table .bar-box{
    width:64px !important;
    min-width:64px !important;
  }
}

@media (max-width:900px){
  .pension-products-table th:first-child, .pension-products-table td:first-child, .combined-performance-table th:first-child, .combined-performance-table td:first-child, .account-summary-table th:first-child, .account-summary-table td:first-child, .hold-position-table th:first-child, .hold-position-table td:first-child{
    position:sticky;
    left:0;
    z-index:3;
    box-shadow:8px 0 10px -10px rgba(15,23,42,.35);
    background-clip:padding-box;
  }

  .pension-products-table thead th:first-child, .combined-performance-table thead th:first-child, .account-summary-table thead th:first-child, .hold-position-table thead th:first-child{
    background:#f1f5f9 !important;
    z-index:5;
  }

  .pension-products-table tbody td:first-child{
    background:#fff !important;
    z-index:2;
  }

  .pension-products-table tbody tr.summary-row td:first-child{
    background:#f8fafc !important;
    z-index:4;
  }

  .combined-performance-table tbody td:first-child, .account-summary-table tbody td:first-child{
    background:#fff !important;
    z-index:2;
  }

  .combined-performance-table tbody tr.summary-row td:first-child, .account-summary-table tbody tr.summary-row td:first-child{
    background:#f8fafc !important;
    z-index:4;
  }

  .hold-position-table tbody td:first-child{
    background:#fff !important;
    z-index:2;
  }

  .hold-position-table tbody tr.ticker-samsung td:first-child{
    background:#fff3d0 !important;
  }

  .hold-position-table tbody tr.ticker-sk td:first-child{
    background:#ffe3e3 !important;
  }

  .hold-position-table tbody tr.ticker-hyundai td:first-child{
    background:#e3f2ff !important;
  }

  .hold-position-table tbody tr.ticker-kodex td:first-child{
    background:#e9f7e9 !important;
  }

  .hold-position-table tbody tr.ticker-mini td:first-child{
    background:#f0f2f5 !important;
  }

  .hold-position-table tbody tr.summary-row td:first-child{
    background:#f8fafc !important;
    z-index:4;
  }
}

@media (max-width:900px){
  .pension-products-table, .combined-performance-table, .account-summary-table, .hold-position-table{
    overflow:visible !important;
  }
}

@media (min-width:1251px){
  .pension-detail-grid{
    grid-template-columns:minmax(0,1.56fr) minmax(480px,.72fr);
  }

  .pension-products-note .mobile-scroll{
    overflow:visible;
  }

  .pension-products-note .mobile-scroll table{
    min-width:0;
    width:100%;
    table-layout:fixed;
    font-size:12px;
  }

  .pension-products-note th, .pension-products-note td{
    padding:8px 7px;
  }

  .pension-products-note th:nth-child(1){
    width:20%;
  }

  .pension-products-note th:nth-child(2){
    width:7%;
  }

  .pension-products-note th:nth-child(3){
    width:10%;
  }

  .pension-products-note th:nth-child(4){
    width:14%;
  }

  .pension-products-note th:nth-child(5){
    width:14%;
  }

  .pension-products-note th:nth-child(6){
    width:14%;
  }

  .pension-products-note th:nth-child(7){
    width:13%;
  }

  .pension-products-note th:nth-child(8){

function pensionRow(r,total){const w=total?r.evalAmount/total*100:0;return `<tr><td><strong>${r.name}</strong></td><td class="num">${fmt(r.qty)}</td><td class="num">${fmt(r.cost/r.qty)}</td><td class="num">${fmt(r.cost)}</td><td class="num">${fmt(r.evalAmount)}</td><td class="num ${cls(r.profit)}">${fmt(r.profit)}</td><td class="num ${cls(r.returnRate)}">${pct(r.returnRate)}</td><td><div class="bar-box"><div class="bar-fill ${r.barClass}" style="width:${Math.max(0,Math.min(100,w)).toFixed(1)}%"></div></div><div class="small">${w.toFixed(1)}%</div></td></tr>`}
function pensionCashRow(cash,total,cost=39408){const w=total?cash/total*100:0,profit=cash-cost,ret=cost?profit/cost*100:0;return `<tr><td><strong>현금성자산</strong></td><td class="num">1</td><td class="num">${fmt(cost)}</td><td class="num">${fmt(cost)}</td><td class="num">${fmt(cash)}</td><td class="num ${cls(profit)}">${fmt(profit)}</td><td class="num ${cls(ret)}">${pct(ret)}</td><td><div class="bar-box"><div class="bar-fill bar-gray" style="width:${w.toFixed(1)}%"></div></div><div class="small">${w.toFixed(1)}%</div></td></tr>`}
function renderCombined(x){const c=PORTFOLIO.constants;return `<div class="note" style="margin-top:16px"><div class="section-title"><h2>계좌+연금 성과</h2><p>단타 제외</p></div><div class="mobile-scroll"><table class="combined-performance-table"><thead><tr><th>구분</th><th>투입원금</th><th>투자 결과물</th><th>누적손익</th><th>투자대비 이익률</th></tr></thead><tbody><tr><td><strong>증권계좌</strong></td><td class="num">${fmt(c.externalPrincipal)}</td><td class="num">${fmt(x.totalResult)}</td><td class="num ${cls(x.totalProfit)}">${fmt(x.totalProfit)}</td><td class="num ${cls(x.returnRate)}">${pct(x.returnRate)}</td></tr><tr><td><strong>퇴직연금</strong></td><td class="num">${fmt(c.pensionContributionPrincipal)}</td><td class="num">${fmt(x.pensionEval)}</td><td class="num ${cls(x.pensionProfit)}">${fmt(x.pensionProfit)}</td><td class="num ${cls(x.pensionReturn)}">${pct(x.pensionReturn)}</td></tr><tr class="summary-row"><td>합산</td><td class="num">${fmt(x.combinedPrincipal)}</td><td class="num">${fmt(x.combinedResult)}</td><td class="num ${cls(x.combinedProfit)}">${fmt(x.combinedProfit)}</td><td class="num ${cls(x.combinedReturn)}">${pct(x.combinedReturn)}</td></tr></tbody></table></div><div class="formula" style="margin-top:12px">투입원금 ${won(x.combinedPrincipal)} = 증권계좌 ${won(c.externalPrincipal)} + 퇴직연금 ${won(c.pensionContributionPrincipal)}\n전체 투자 결과물 ${won(x.combinedResult)} = 증권계좌 ${won(x.totalResult)} + 퇴직연금 ${won(x.pensionEval)}\n총 합산 누적손익 ${won(x.combinedProfit)} = 증권계좌 ${won(x.totalProfit)} + 퇴직연금 ${won(x.pensionProfit)}\n투자대비 이익률 ${pct(x.combinedReturn)} = ${fmt(x.combinedProfit)} ÷ ${fmt(x.combinedPrincipal)}</div></div>`}
function calcMdd(cum){
  if(!cum.length)return null;
  let peak=cum[0], maxDrop=0, from=cum[0].날짜, to=cum[0].날짜;
  for(const r of cum){
    if(r['합계 : 누적손익']>peak['합계 : 누적손익']) peak=r;
    const drop=r['합계 : 누적손익']-peak['합계 : 누적손익'];
    if(drop<maxDrop){maxDrop=drop;from=peak.날짜;to=r.날짜;}
  }
  return {drop:maxDrop,from,to};
}

function clear(svg){while(svg.firstChild)svg.removeChild(svg.firstChild)}
function el(name, attrs={}){const e=document.createElementNS('http://www.w3.org/2000/svg',name);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function tooltip(){return document.getElementById('dashTooltip')}
function showTooltip(evt, html){
  const tt=tooltip(); if(!tt) return;
  tt.innerHTML=html; tt.classList.add('visible');
  const pad=14; tt.style.left=evt.clientX+'px'; tt.style.top=(evt.clientY-12)+'px';
  requestAnimationFrame(()=>{
    const r=tt.getBoundingClientRect();
    if(r.right>window.innerWidth-pad)tt.style.left=(window.innerWidth-pad-r.width/2)+'px';
    if(r.left<pad)tt.style.left=(pad+r.width/2)+'px';
    if(r.top<pad){tt.style.transform='translate(-50%,18px)';tt.style.top=evt.clientY+'px'}else{tt.style.transform='translate(-50%,-110%)'}
  });
}
function hideTooltip(){const tt=tooltip(); if(tt)tt.classList.remove('visible')}
function row(name,val,clsName=''){return `<div class="tt-row"><span class="tt-name">${name}</span><span class="tt-val ${clsName}">${val}</span></div>`}
function clsBy(n){return n<0?'tt-neg':(n>0?'tt-pos':'')}
function drawAxes(svg,cfg,yTicks,y2Ticks=null){
  const{w,h,l,r,t,b}=cfg;
  svg.appendChild(el('rect',{x:0,y:0,width:w,height:h,fill:'#fff'}));
  for(const tick of yTicks){const y=cfg.y(tick);svg.appendChild(el('line',{x1:l,y1:y,x2:w-r,y2:y,stroke:'#e5e7eb','stroke-width':1}));const tx=el('text',{x:l-10,y:y+4,'text-anchor':'end','font-size':11,fill:'#6b7280'});tx.textContent=fmt(tick);svg.appendChild(tx)}
  svg.appendChild(el('line',{x1:l,y1:t,x2:l,y2:h-b,stroke:'#cbd5e1'}));
  svg.appendChild(el('line',{x1:l,y1:h-b,x2:w-r,y2:h-b,stroke:'#cbd5e1'}));
  if(y2Ticks){for(const tick of y2Ticks){const y=cfg.y2(tick);const tx=el('text',{x:w-r+10,y:y+4,'text-anchor':'start','font-size':11,fill:'#6b7280'});tx.textContent=tick.toFixed(0)+'%';svg.appendChild(tx)}svg.appendChild(el('line',{x1:w-r,y1:t,x2:w-r,y2:h-b,stroke:'#cbd5e1'}))}
}
function labelDates(svg,cfg,data,every=3){
  const{w,h,l,r,b}=cfg,plotW=w-l-r;
  data.forEach((d,i)=>{if(i%every===0||i===data.length-1){const x=l+(data.length===1?0:i*plotW/(data.length-1));const txt=el('text',{x:x,y:h-b+32,transform:`rotate(-65 ${x} ${h-b+32})`,'text-anchor':'end','font-size':10,fill:'#6b7280'});txt.textContent=d['날짜'];svg.appendChild(txt)}})
}
function polyline(svg,points,color,width=2.5){svg.appendChild(el('polyline',{points:points.map(p=>p.join(',')).join(' '),fill:'none',stroke:color,'stroke-width':width,'stroke-linejoin':'round','stroke-linecap':'round'}))}
function circles(svg,points,color){points.forEach(p=>svg.appendChild(el('circle',{cx:p[0],cy:p[1],r:3,fill:'#fff',stroke:color,'stroke-width':2})))}
function nearestIndex(evt,svg,cfg,data){
  const pt=svg.createSVGPoint();pt.x=evt.clientX;pt.y=evt.clientY;
  const loc=pt.matrixTransform(svg.getScreenCTM().inverse());
  const plotW=cfg.w-cfg.l-cfg.r;
  let idx=Math.round((loc.x-cfg.l)/plotW*(data.length-1));
  return Math.max(0,Math.min(data.length-1,idx));
}
function addHover(svg,cfg,data,renderHtml){
  const line=el('line',{x1:cfg.l,y1:cfg.t,x2:cfg.l,y2:cfg.h-cfg.b,stroke:'#334155','stroke-width':1.2,'stroke-dasharray':'4 4',opacity:0,class:'chart-hover-line'});
  svg.appendChild(line);
  const hit=el('rect',{x:cfg.l,y:cfg.t,width:cfg.w-cfg.l-cfg.r,height:cfg.h-cfg.t-cfg.b,class:'svg-hitbox'});
  svg.appendChild(hit);
  hit.addEventListener('mousemove',evt=>{const idx=nearestIndex(evt,svg,cfg,data);const x=cfg.l+(data.length===1?0:idx*(cfg.w-cfg.l-cfg.r)/(data.length-1));line.setAttribute('x1',x);line.setAttribute('x2',x);line.setAttribute('opacity',1);showTooltip(evt,renderHtml(data[idx],idx))});
  hit.addEventListener('mouseleave',()=>{line.setAttribute('opacity',0);hideTooltip()});
}
function drawCumChart(){
  const data=cumHistory(ACTIVE_DATE),svg=document.getElementById('chartCum');if(!svg)return;clear(svg);
  const w=1120,h=330,l=70,r=70,t=22,b=72;svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  const vals=data.flatMap(d=>[d['합계 : 누적손익'],d['합계 : 전일대비손익']]);
  const rates=data.map(d=>d['합계 : 누적수익률']);
  const minY=Math.min(-4000000,...vals),maxY=Math.max(12000000,...vals),minR=Math.min(-20,...rates),maxR=Math.max(80,...rates);
  const cfg={w,h,l,r,t,b,y:v=>t+(maxY-v)/(maxY-minY)*(h-t-b),y2:v=>t+(maxR-v)/(maxR-minR)*(h-t-b)};
  drawAxes(svg,cfg,[-4000000,-2000000,0,2000000,4000000,6000000,8000000,10000000,12000000],[-20,0,20,40,60,80]);
  const plotW=w-l-r,n=data.length,gap=plotW/Math.max(n,1),bw=gap*.28;
  data.forEach((d,i)=>{const x=l+(n===1?0:i*plotW/(n-1)),zero=cfg.y(0),cp=cfg.y(d['합계 : 누적손익']);svg.appendChild(el('rect',{x:x-bw-1,y:Math.min(cp,zero),width:bw,height:Math.abs(zero-cp),fill:'#ffb84d',opacity:.8}));const day=cfg.y(d['합계 : 전일대비손익']);svg.appendChild(el('rect',{x:x+2,y:Math.min(day,zero),width:bw,height:Math.abs(zero-day),fill:d['합계 : 전일대비손익']>=0?'#a7d7a8':'#c7e6c8',stroke:d['합계 : 전일대비손익']<0?'#86b58a':'none',opacity:.9}))});
  const pts=data.map((d,i)=>[l+(n===1?0:i*plotW/(n-1)),cfg.y2(d['합계 : 누적수익률'])]);
  polyline(svg,pts,'#5abdf2',2.5);circles(svg,pts,'#5abdf2');labelDates(svg,cfg,data,3);
  addHover(svg,cfg,data,d=>`<div class="tt-date">${d['날짜']}</div>`+row('누적손익',signed(d['합계 : 누적손익'],'원'),clsBy(d['합계 : 누적손익']))+row('누적수익률',pct(d['합계 : 누적수익률']),clsBy(d['합계 : 누적수익률']))+row('전일대비손익',signed(d['합계 : 전일대비손익'],'원'),clsBy(d['합계 : 전일대비손익'])));
}
function drawLineChart(){
  const data=symbolHistory(ACTIVE_DATE),svg=document.getElementById('chartSymbol');if(!svg)return;clear(svg);
  const series=['SK하이닉스','삼성전자','현대차','KODEX200'],colors={'SK하이닉스':'#ff8a65','삼성전자':'#8bc34a','현대차':'#26c6da','KODEX200':'#42a5f5'},values=data.flatMap(d=>series.map(s=>d[s]||0));
  const minY=Math.min(-1000000,...values),maxY=Math.max(7000000,...values),w=1120,h=330,l=70,r=25,t=22,b=72;svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  const cfg={w,h,l,r,t,b,y:v=>t+(maxY-v)/(maxY-minY)*(h-t-b)};drawAxes(svg,cfg,[-1000000,0,1000000,2000000,3000000,4000000,5000000,6000000,7000000]);
  const plotW=w-l-r,n=data.length;series.forEach(s=>{const pts=data.map((d,i)=>[l+(n===1?0:i*plotW/(n-1)),cfg.y(d[s]||0)]);polyline(svg,pts,colors[s]);circles(svg,pts,colors[s])});labelDates(svg,cfg,data,3);
  addHover(svg,cfg,data,d=>{let html=`<div class="tt-date">${d['날짜']}</div>`;series.forEach(s=>html+=row(s,signed(d[s]||0,'원'),clsBy(d[s]||0)));const total=series.reduce((a,s)=>a+(d[s]||0),0);return html+'<div style="height:6px"></div>'+row('4종목 합계',signed(total,'원'),clsBy(total))});
}
function drawStacked(){
  const data=allocHistory(ACTIVE_DATE),svg=document.getElementById('chartAlloc');if(!svg)return;clear(svg);
  const values=data.map(d=>d.ETF+d.개별주식+d.현금),maxY=Math.max(30000000,...values)*1.05,w=1120,h=330,l=70,r=25,t=22,b=72;svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  const cfg={w,h,l,r,t,b,y:v=>t+(maxY-v)/(maxY)*(h-t-b)};drawAxes(svg,cfg,[0,5000000,10000000,15000000,20000000,25000000,30000000]);
  const plotW=w-l-r,n=data.length,gap=plotW/Math.max(n,1),bw=gap*.72;
  data.forEach((d,i)=>{const x=l+(n===1?0:i*plotW/(n-1))-bw/2;let base=0;[['ETF','#ff6b6b'],['개별주식','#ffc857'],['현금','#8fd18f']].forEach(([key,color])=>{const yTop=cfg.y(base+d[key]),yBase=cfg.y(base);svg.appendChild(el('rect',{x:x,y:yTop,width:bw,height:yBase-yTop,fill:color,opacity:.75,stroke:'#fff','stroke-width':.4}));base+=d[key]})});
  labelDates(svg,cfg,data,3);
  addHover(svg,cfg,data,d=>{const total=d.ETF+d.개별주식+d.현금;return `<div class="tt-date">${d['날짜']}</div>`+row('ETF',fmt(d.ETF)+`원 (${(d.ETF/total*100).toFixed(1)}%)`)+row('개별주식',fmt(d.개별주식)+`원 (${(d.개별주식/total*100).toFixed(1)}%)`)+row('현금',fmt(d.현금)+`원 (${(d.현금/total*100).toFixed(1)}%)`)+'<div style="height:6px"></div>'+row('합계',fmt(total)+'원')});
}
function refreshScrollHints(){
  document.querySelectorAll('.mobile-scroll, .chart-wrap').forEach(wrap=>{
    const prev=wrap.previousElementSibling;
    if(prev&&prev.classList.contains('scroll-hint'))prev.remove();
    const scrollable=wrap.scrollWidth>wrap.clientWidth+4;
    wrap.classList.toggle('is-scrollable',scrollable);
    if(scrollable){const hint=document.createElement('div');hint.className='scroll-hint';hint.textContent='좌우로 밀어 더 보기';wrap.parentNode.insertBefore(hint,wrap)}
  });
}
function drawAllCharts(){drawCumChart();drawLineChart();drawStacked();refreshScrollHints();setTimeout(refreshScrollHints,120)}
async function boot(){[PORTFOLIO,PRICES,SNAPSHOTS]=await Promise.all([fetch('data/portfolio.json?ts='+Date.now()).then(r=>r.json()),fetch('data/prices.json?ts='+Date.now()).then(r=>r.json()),fetch('data/performance_snapshots.json?ts='+Date.now()).then(r=>r.json())]);const displayDates=Object.keys(PRICES).filter(d=>PRICES[d].display!==false).sort(byDate),hash=location.hash.replace('#','');ACTIVE_DATE=displayDates.includes(hash)?hash:displayDates.at(-1);render();document.getElementById('tabs').addEventListener('click',e=>{
  const menuButton=e.target.closest('#mobileDateButton');
  if(menuButton){
    e.preventDefault();
    const opts=document.getElementById('mobileDateOptions');
    if(opts) opts.classList.toggle('open');
    return;
  }
  const picked=e.target.closest('.date-link,.mobile-date-option');
  if(!picked)return;
  e.preventDefault();
  ACTIVE_DATE=picked.dataset.date;
  history.replaceState(null,'','#'+ACTIVE_DATE);
  render();
})}boot().catch(err=>{document.getElementById('app').innerHTML=`<div class="wrap"><div class="note"><h2>데이터 로딩 오류</h2><pre>${String(err)}</pre></div></div>`})
</script></body></html>
