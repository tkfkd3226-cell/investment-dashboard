<style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#6b7280;--line:#d7dce5;--blue:#1f5eff;--green:#16a34a;--red:#dc2626;--navy:#0f172a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;line-height:1.45}.switcher{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;padding:10px 14px;background:linear-gradient(135deg,#111827,#1f2937 55%,#0f172a);border-bottom:1px solid rgba(255,255,255,.12);box-shadow:0 8px 24px rgba(0,0,0,.22)}.date-link{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:7px 12px;border:1px solid rgba(255,255,255,.28);border-radius:999px;color:#dbeafe;background:rgba(255,255,255,.08);font-size:13px;font-weight:900;text-decoration:none;white-space:nowrap;cursor:pointer}.date-link.active{background:#fff;color:#111827;border-color:#fff}.wrap{max-width:1680px;margin:0 auto;padding:24px}.hero{background:linear-gradient(135deg,#111827 0%,#1f2937 50%,#0f172a 100%);color:#fff;border-radius:22px;padding:28px 30px;box-shadow:0 16px 40px rgba(15,23,42,.22)}.hero h1{margin:0 0 8px;font-size:30px;letter-spacing:-.04em}.hero p{margin:0;color:#d1d5db;font-size:15px}.pillbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.pill{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);font-size:13px;color:#f3f4f6}.grid{display:grid;gap:16px}.cards{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:18px}.card,.note,.chart-card,.pension-band{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 22px rgba(15,23,42,.06)}.card.dark{background:#111827;color:white;border-color:#111827}.label,.m-label{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:7px}.dark .label{color:#cbd5e1}.value{font-size:28px;font-weight:900;letter-spacing:-.04em}.sub{font-size:13px;color:var(--muted);margin-top:5px}.dark .sub{color:#cbd5e1}.positive{color:var(--green)!important}.negative{color:var(--red)!important}.blue{color:var(--blue)!important}section{margin-top:22px}.section-title{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:0 0 12px}.section-title h2{margin:0;font-size:22px;letter-spacing:-.04em}.section-title p{margin:0;color:var(--muted);font-size:13px}.mobile-scroll{overflow:auto;border-radius:16px}.mobile-scroll table{min-width:980px}table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;background:white;border:1px solid var(--line);border-radius:16px;overflow:hidden}th,td{padding:9px 10px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);vertical-align:middle}th:last-child,td:last-child{border-right:0}tr:last-child td{border-bottom:0}thead th{background:#f1f5f9;color:#111827;font-weight:900;text-align:center;white-space:nowrap}td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}.small{font-size:12px;color:var(--muted)}.summary-row td{background:#f8fafc;font-weight:900}.hold-row td{font-weight:800}.ticker-samsung{background:#fff3d0}.ticker-sk{background:#ffe3e3}.ticker-hyundai{background:#e3f2ff}.ticker-kodex{background:#e9f7e9}.ticker-mini{background:#f0f2f5}.pension-band{background:linear-gradient(135deg,#ecfdf5 0%,#eff6ff 52%,#fff7ed 100%)}.two{grid-template-columns:minmax(0,1.56fr) minmax(480px,.72fr)}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.kpi-mini,.change-kpis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}.mini-card{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:12px;min-width:0}.mini-card .m-label{font-size:12px;margin:0}.mini-card .m-value{font-size:19px;font-weight:900;margin-top:2px}.formula{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#0f172a;color:#e5e7eb;border-radius:12px;padding:12px;overflow:auto;font-size:12px;white-space:pre-wrap}.bar-box{height:12px;background:#eef2f7;border-radius:999px;overflow:hidden;border:1px solid #dbe2ec}.bar-fill{height:100%;border-radius:999px}.bar-blue{background:#3b82f6}.bar-green{background:#22c55e}.bar-amber{background:#f59e0b}.bar-gray{background:#94a3b8}.chart-grid{grid-template-columns:1fr;gap:18px}.chart-head h3{margin:0;font-size:18px;letter-spacing:-.03em}.chart-head p{margin:4px 0 0;color:var(--muted);font-size:12px}.chart-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}svg.chart{width:100%;min-width:960px;height:330px;display:block;background:#fff;border-radius:12px}.chart-legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:10px;font-size:12px;color:#555}.legend-item{display:inline-flex;align-items:center;gap:5px}.swatch{width:12px;height:12px;border-radius:3px;display:inline-block}.chart-note{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;width:100%;min-width:0;margin-top:12px}.chart-note.six{grid-template-columns:repeat(6,minmax(0,1fr))!important}.chart-note.symbol-summary-grid{display:grid!important;grid-template-columns:repeat(4,minmax(0,1fr))!important;width:100%!important}.symbol-metrics{display:grid;gap:6px;padding-top:9px;border-top:1px solid var(--line)}.symbol-metric{display:flex;align-items:center;justify-content:space-between;gap:10px;min-width:0}.symbol-metric-label{color:var(--muted);font-size:11px;font-weight:800}.symbol-metric-value{font-size:12px;font-weight:900;white-space:nowrap}.symbol-summary-note{margin-top:8px;color:var(--muted);font-size:11px}.result-summary-grid{grid-template-columns:repeat(auto-fit,minmax(min(100%,520px),1fr))!important;align-items:stretch}.dash-tooltip{position:fixed;z-index:9999;min-width:210px;max-width:320px;background:rgba(15,23,42,.96);color:#fff;border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:10px 12px;box-shadow:0 16px 36px rgba(0,0,0,.28);font-size:12px;line-height:1.5;pointer-events:none;opacity:0;transform:translate(-50%,-110%);transition:opacity .08s ease}.dash-tooltip.visible{opacity:1}.tt-date{font-weight:900;font-size:13px;margin-bottom:6px}.tt-row{display:flex;justify-content:space-between;gap:16px;white-space:nowrap}.tt-name{color:#cbd5e1}.tt-val{font-weight:800}.tt-pos{color:#86efac}.tt-neg{color:#fca5a5}@media(max-width:1100px){.cards,.three,.two{grid-template-columns:1fr}.wrap{padding:7px!important}.hero{padding:14px 15px!important}.card,.note,.chart-card,.pension-band{padding:9px!important}.value{font-size:24px}}@media(max-width:900px){.chart-note.six{grid-template-columns:repeat(2,minmax(0,1fr))!important}.chart-note.symbol-summary-grid{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;grid-auto-flow:row!important;gap:8px!important;width:100%!important}.chart-note.symbol-summary-grid>.mini-card{display:block!important;width:auto!important;min-width:0!important;max-width:none!important;margin:0!important;padding:9px!important;box-sizing:border-box!important}.chart-note.symbol-summary-grid .m-label{font-size:10.5px!important}.chart-note.symbol-summary-grid .m-value{font-size:14px!important;line-height:1.18!important;white-space:nowrap!important;letter-spacing:-.035em!important}.chart-note.symbol-summary-grid .symbol-metric{display:flex!important;flex-direction:column!important;align-items:flex-start!important;gap:1px!important}.combined-performance-table,.account-summary-table,.pension-products-table{width:max-content!important;min-width:max-content!important;table-layout:auto!important;font-size:12px!important}.combined-performance-table th,.combined-performance-table td,.account-summary-table th,.account-summary-table td,.pension-products-table th,.pension-products-table td{padding:7px 8px!important;white-space:nowrap}.pension-products-table th:first-child,.pension-products-table td:first-child,.combined-performance-table th:first-child,.combined-performance-table td:first-child,.account-summary-table th:first-child,.account-summary-table td:first-child,.hold-position-table th:first-child,.hold-position-table td:first-child{position:sticky;left:0;z-index:3;box-shadow:8px 0 10px -10px rgba(15,23,42,.35);background-clip:padding-box;width:1%!important;min-width:0!important;max-width:none!important;padding-left:6px!important;padding-right:6px!important;white-space:nowrap!important}thead th:first-child{background:#f1f5f9!important;z-index:5}tbody td:first-child{background:#fff!important}.ticker-samsung td:first-child{background:#fff3d0!important}.ticker-sk td:first-child{background:#ffe3e3!important}.ticker-hyundai td:first-child{background:#e3f2ff!important}.ticker-kodex td:first-child{background:#e9f7e9!important}.ticker-mini td:first-child{background:#f0f2f5!important}.summary-row td:first-child{background:#f8fafc!important}}
</style>

<body>
<nav id="tabs" class="switcher" aria-label="대시보드 기준일 선택"></nav><div id="app"></div><div class="dash-tooltip" id="dashTooltip"></div>
<script>
let PORTFOLIO,PRICES,ACTIVE_DATE;const fmt=n=>Math.round(Number(n)||0).toLocaleString('ko-KR'),won=n=>fmt(n)+'원',pct=n=>(Number(n)||0).toFixed(2)+'%',signed=(n,s='')=>(n>0?'+':'')+fmt(n)+s,cls=n=>n<0?'negative':(n>0?'positive':''),byDate=(a,b)=>a.localeCompare(b),shortDate=d=>{const [y,m,day]=d.split('-');return `${Number(m)}/${Number(day)}`},koreanDateLabel=d=>{
  const [y,m,day]=d.split('-');
  const snap=PRICES?.[d]||{};
  const status=snap.marketStatus||'close';
  if(status==='intraday'){
    const time=snap.updatedAtKST?snap.updatedAtKST.slice(11,16):'';
    return `${Number(m)}월 ${Number(day)}일 장중 ${time} 기준`;
  }
  return `${Number(m)}월 ${Number(day)}일 KRX 종가 기준`;
},
basisText=d=>{
  const snap=PRICES?.[d]||{};
  const status=snap.marketStatus||'close';
  if(status==='intraday'){
    const time=snap.updatedAtKST?snap.updatedAtKST.slice(11,16):'';
    return `장중 ${time} 기준`;
  }
  return 'KRX 종가 기준';
};
function previousDate(date){return Object.keys(PRICES).filter(d=>d<date).sort(byDate).at(-1)||null}function getPrice(s,section,ticker){return s?.[section]?.[ticker]??null}
function calc(date){const p=PORTFOLIO,c=p.constants,s=PRICES[date],pk=previousDate(date),prev=pk?PRICES[pk]:null;const holdings=p.securities.map(h=>{const price=getPrice(s,'securities',h.ticker),prevPrice=prev?getPrice(prev,'securities',h.ticker):null,evalAmount=(price||0)*h.qty,profit=evalAmount-h.cost,feeAdjustedProfit=profit-(h.feeBuffer||0),prevProfit=prevPrice==null?null:prevPrice*h.qty-h.cost;return {...h,price,prevPrice,evalAmount,profit,feeAdjustedProfit,returnRate:h.cost?profit/h.cost*100:0,dayChange:prevPrice==null?null:(price-prevPrice)*h.qty,prevProfit}});const rawHoldingProfit=holdings.reduce((a,h)=>a+h.profit,0),account1Profit=rawHoldingProfit+c.account1ProfitAdjustment,account1Result=c.account1Principal+account1Profit,totalProfit=account1Profit+c.account2Profit+c.tossProfit,totalResult=c.externalPrincipal+totalProfit,returnRate=totalProfit/c.externalPrincipal*100,actualHolding=totalResult-c.livingSpent;const pensionRows=p.pension.map(pos=>{const price=getPrice(s,'pension',pos.ticker),prevPrice=prev?getPrice(prev,'pension',pos.ticker):null,evalAmount=(price||0)*pos.qty,profit=evalAmount-pos.cost,prevEval=prevPrice==null?null:prevPrice*pos.qty;return {...pos,price,prevPrice,evalAmount,profit,returnRate:pos.cost?profit/pos.cost*100:0,dayChange:prevEval==null?null:evalAmount-prevEval,prevEval}});const pensionCash=Number(s?.pension?.cash||0),prevPensionCash=Number(prev?.pension?.cash||0),pensionEval=pensionRows.reduce((a,r)=>a+r.evalAmount,0)+pensionCash,pensionPrevEval=prev?pensionRows.reduce((a,r)=>a+(r.prevEval||0),0)+prevPensionCash:null,pensionProfit=pensionEval-c.pensionContributionPrincipal,pensionReturn=pensionProfit/c.pensionContributionPrincipal*100,combinedPrincipal=c.externalPrincipal+c.pensionContributionPrincipal,combinedResult=totalResult+pensionEval,combinedProfit=totalProfit+pensionProfit,combinedReturn=combinedProfit/combinedPrincipal*100,etfEval=holdings.filter(h=>h.type==='ETF').reduce((a,h)=>a+h.evalAmount,0),stockEval=holdings.filter(h=>h.type==='개별주식').reduce((a,h)=>a+h.evalAmount,0),allocTotal=etfEval+stockEval+c.securitiesCash;return {date,s,prevKey:pk,prev,holdings,rawHoldingProfit,account1Profit,account1Result,totalProfit,totalResult,returnRate,actualHolding,pensionRows,pensionCash,prevPensionCash,pensionEval,pensionPrevEval,pensionProfit,pensionReturn,combinedPrincipal,combinedResult,combinedProfit,combinedReturn,etfEval,stockEval,allocTotal}}
function historyDates(d){return Object.keys(PRICES).filter(x=>x<=d).sort(byDate)}function cumHistory(d){return historyDates(d).map(x=>{const c=calc(x);return {'날짜':x,'합계 : 누적손익':c.rawHoldingProfit,'합계 : 누적수익률':c.rawHoldingProfit/PORTFOLIO.constants.account1Principal*100,'합계 : 전일대비손익':c.prevKey?c.rawHoldingProfit-calc(c.prevKey).rawHoldingProfit:0}})}function symbolHistory(d){return historyDates(d).map(x=>{const c=calc(x),r={'날짜':x};c.holdings.filter(h=>h.chart).forEach(h=>r[h.name==='KODEX 200'?'KODEX200':h.name]=h.profit);return r})}function allocHistory(d){return historyDates(d).map(x=>{const c=calc(x);return {'날짜':x,ETF:c.etfEval,개별주식:c.stockEval,현금:PORTFOLIO.constants.securitiesCash}})}
function renderTabs(){const dates=Object.keys(PRICES).filter(d=>PRICES[d].display!==false).sort(byDate);document.getElementById('tabs').innerHTML=dates.map(d=>`<a class="date-link ${d===ACTIVE_DATE?'active':''}" href="#${d}" data-date="${d}">${koreanDateLabel(d)}</a>`).join('')}
function metricCard(label,value,sub,dark=false,vcls=''){return `<div class="card ${dark?'dark':''}"><div class="label">${label}</div><div class="value ${vcls}">${value}</div><div class="sub">${sub}</div></div>`}
function render(){const x=calc(ACTIVE_DATE),c=PORTFOLIO.constants;renderTabs();document.getElementById('app').innerHTML=`<div class="wrap"><header class="hero"><h1>${PORTFOLIO.meta.title}</h1><p>수량 변동이 없다는 전제에서 날짜별 KRX 종가만 반영해 증권계좌와 퇴직연금 성과를 자동 계산.</p><div class="pillbar"><span class="pill">전체 외부투입원금 ${won(c.externalPrincipal)}</span><span class="pill">총 합산 누적손익 ${won(x.totalProfit)}</span><span class="pill">투자대비 이익률 ${pct(x.returnRate)}</span><span class="pill">전체 투자 결과물 ${won(x.totalResult)}</span><span class="pill">퇴직연금 포함 결과물 ${won(x.combinedResult)}</span></div></header><div class="grid cards">${metricCard('전체 투자 결과물',won(x.totalResult),'외부투입원금 + 총 합산 누적손익',true)}${metricCard('전체 외부투입원금',won(c.externalPrincipal),`금 판매액 ${fmt(c.goldPrincipal)} + 근로소득 순투입 ${fmt(c.laborNetPrincipal)}`)}${metricCard('총 합산 누적손익',won(x.totalProfit),'계좌1 + 계좌2 + 토스증권',false,'positive')}${metricCard('투자대비 이익률',pct(x.returnRate),'총 합산 누적손익 ÷ 전체 외부투입원금',false,'blue')}</div>${renderPension(x)}${renderCharts(x)}${renderAccounts(x)}${renderResultSummary(x)}${renderHoldings(x)}${renderSourceTables()}</div>`;drawAllCharts()}
function renderPension(x){const c=PORTFOLIO.constants,day=x.pensionPrevEval==null?null:x.pensionEval-x.pensionPrevEval,rate=x.pensionPrevEval?day/x.pensionPrevEval*100:0;return `<section><div class="section-title"><h2>퇴직연금 현황</h2><p>${shortDate(x.date)} ${basisText(x.date)}</p></div><div class="pension-band"><div class="grid cards" style="margin-top:0">${metricCard('퇴직연금 평가금액',won(x.pensionEval),`${shortDate(x.date)} ${basisText(x.date)}`,true)}${metricCard('퇴직연금 납입원금',won(c.pensionContributionPrincipal),'최초 납입 시점부터 누적 기준')}${metricCard('퇴직연금 운용수익',won(x.pensionProfit),'평가금액 - 납입원금',false,'positive')}${metricCard('퇴직연금 누적수익률',pct(x.pensionReturn),`${shortDate(x.date)} ${basisText(x.date)} 평가금액 ÷ 누적 납입원금 기준`,false,'blue')}</div><div class="grid two" style="margin-top:16px"><div class="note"><div class="section-title"><h2>${shortDate(x.date)} 기준 상품별 현황</h2></div><div class="mobile-scroll"><table class="pension-products-table"><thead><tr><th>상품</th><th>수량</th><th>평균단가</th><th>매수원금</th><th>평가금액</th><th>평가손익</th><th>수익률</th><th>비중</th></tr></thead><tbody>${x.pensionRows.map(r=>pensionRow(r,x.pensionEval)).join('')}${pensionCashRow(x.pensionCash,x.pensionEval)}<tr class="summary-row"><td>합계</td><td></td><td></td><td class="num">${fmt(x.pensionRows.reduce((a,r)=>a+r.cost,0)+x.pensionCash)}</td><td class="num">${fmt(x.pensionEval)}</td><td class="num ${cls(x.pensionProfit)}">${fmt(x.pensionProfit)}</td><td class="num ${cls(x.pensionReturn)}">${pct(x.pensionReturn)}</td><td></td></tr></tbody></table></div><p class="small" style="margin-top:10px">※ 매수원금 합계는 현재 보유상품 재투자 기준</p></div><div class="note"><div class="section-title"><h2>전일 대비 변동</h2></div><div class="change-kpis"><div class="mini-card"><div class="m-label">${x.prevKey?shortDate(x.prevKey):'-'} 평가금액</div><div class="m-value">${x.pensionPrevEval==null?'-':won(x.pensionPrevEval)}</div></div><div class="mini-card"><div class="m-label">${shortDate(x.date)} 평가금액</div><div class="m-value">${won(x.pensionEval)}</div></div><div class="mini-card"><div class="m-label">하루 변동분</div><div class="m-value ${cls(day)}">${day==null?'-':signed(day,'원')}</div></div><div class="mini-card"><div class="m-label">하루 변동률</div><div class="m-value ${cls(rate)}">${x.pensionPrevEval==null?'-':(rate>0?'+':'')+pct(rate)}</div></div></div><div class="mobile-scroll" style="margin-top:12px"><table><thead><tr><th>상품</th><th>${x.prevKey?shortDate(x.prevKey):'-'} 종가</th><th>${shortDate(x.date)} 종가</th><th>일변동</th></tr></thead><tbody>${x.pensionRows.map(r=>`<tr><td>${r.name}</td><td class="num">${r.prevPrice==null?'-':fmt(r.prevPrice)}<br><span class="small">${r.prevEval==null?'-':won(r.prevEval)}</span></td><td class="num">${fmt(r.price)}<br><span class="small">${won(r.evalAmount)}</span></td><td class="num ${cls(r.dayChange)}">${r.dayChange==null?'-':signed(r.dayChange)}</td></tr>`).join('')}<tr><td>현금성자산</td><td class="num">${won(x.prevPensionCash)}</td><td class="num">${won(x.pensionCash)}</td><td class="num ${cls(x.pensionCash-x.prevPensionCash)}">${signed(x.pensionCash-x.prevPensionCash)}</td></tr><tr class="summary-row"><td>합계</td><td class="num">${x.pensionPrevEval==null?'-':fmt(x.pensionPrevEval)}</td><td class="num">${fmt(x.pensionEval)}</td><td class="num ${cls(day)}">${day==null?'-':signed(day)}</td></tr></tbody></table></div></div></div>${renderCombined(x)}</div></section>`}
function pensionRow(r,total){const w=total?r.evalAmount/total*100:0;return `<tr><td><strong>${r.name}</strong></td><td class="num">${fmt(r.qty)}</td><td class="num">${fmt(r.cost/r.qty)}</td><td class="num">${fmt(r.cost)}</td><td class="num">${fmt(r.evalAmount)}</td><td class="num ${cls(r.profit)}">${fmt(r.profit)}</td><td class="num ${cls(r.returnRate)}">${pct(r.returnRate)}</td><td><div class="bar-box"><div class="bar-fill ${r.barClass}" style="width:${Math.max(0,Math.min(100,w)).toFixed(1)}%"></div></div><div class="small">${w.toFixed(1)}%</div></td></tr>`}function pensionCashRow(cash,total){const w=total?cash/total*100:0;return `<tr><td><strong>현금성자산</strong></td><td class="num">1</td><td class="num">${fmt(cash)}</td><td class="num">${fmt(cash)}</td><td class="num">${fmt(cash)}</td><td class="num">0</td><td class="num">0.00%</td><td><div class="bar-box"><div class="bar-fill bar-gray" style="width:${w.toFixed(1)}%"></div></div><div class="small">${w.toFixed(1)}%</div></td></tr>`}

function clear(svg){while(svg.firstChild)svg.removeChild(svg.firstChild)}function el(n,a={}){const e=document.createElementNS('http://www.w3.org/2000/svg',n);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e}function drawAxes(svg,cfg,ticks){const{w,h,l,r,t,b}=cfg;svg.appendChild(el('rect',{x:0,y:0,width:w,height:h,fill:'#fff'}));for(const tick of ticks){const y=cfg.y(tick);svg.appendChild(el('line',{x1:l,y1:y,x2:w-r,y2:y,stroke:'#e5e7eb'}));const tx=el('text',{x:l-10,y:y+4,'text-anchor':'end','font-size':11,fill:'#6b7280'});tx.textContent=fmt(tick);svg.appendChild(tx)}svg.appendChild(el('line',{x1:l,y1:t,x2:l,y2:h-b,stroke:'#cbd5e1'}));svg.appendChild(el('line',{x1:l,y1:h-b,x2:w-r,y2:h-b,stroke:'#cbd5e1'}))}function labelDates(svg,cfg,data){const{w,h,l,r,b}=cfg,plotW=w-l-r;data.forEach((d,i)=>{const x=l+(data.length===1?0:i*plotW/(data.length-1));const txt=el('text',{x:x,y:h-b+32,transform:`rotate(-65 ${x} ${h-b+32})`,'text-anchor':'end','font-size':10,fill:'#6b7280'});txt.textContent=d['날짜'];svg.appendChild(txt)})}function polyline(svg,pts,color){svg.appendChild(el('polyline',{points:pts.map(p=>p.join(',')).join(' '),fill:'none',stroke:color,'stroke-width':2.5,'stroke-linejoin':'round','stroke-linecap':'round'}))}function circles(svg,pts,color){pts.forEach(p=>svg.appendChild(el('circle',{cx:p[0],cy:p[1],r:3,fill:'#fff',stroke:color,'stroke-width':2}))}function drawCumChart(){const data=cumHistory(ACTIVE_DATE),svg=document.getElementById('chartCum');if(!svg)return;clear(svg);const w=1120,h=330,l=70,r=25,t=22,b=72;svg.setAttribute('viewBox',`0 0 ${w} ${h}`);const vals=data.flatMap(d=>[d['합계 : 누적손익'],d['합계 : 전일대비손익']]),minY=Math.min(-4000000,...vals),maxY=Math.max(12000000,...vals),cfg={w,h,l,r,t,b,y:v=>t+(maxY-v)/(maxY-minY)*(h-t-b)};drawAxes(svg,cfg,[-4000000,-2000000,0,2000000,4000000,6000000,8000000,10000000,12000000]);const plotW=w-l-r,n=data.length,bw=plotW/Math.max(n,1)*.25;data.forEach((d,i)=>{const x=l+(n===1?0:i*plotW/(n-1)),zero=cfg.y(0),cp=cfg.y(d['합계 : 누적손익']);svg.appendChild(el('rect',{x:x-bw-1,y:Math.min(cp,zero),width:bw,height:Math.abs(zero-cp),fill:'#ffb84d',opacity:.8}));const day=cfg.y(d['합계 : 전일대비손익']);svg.appendChild(el('rect',{x:x+2,y:Math.min(day,zero),width:bw,height:Math.abs(zero-day),fill:d['합계 : 전일대비손익']>=0?'#a7d7a8':'#c7e6c8',opacity:.9}))});labelDates(svg,cfg,data)}function drawLineChart(){const data=symbolHistory(ACTIVE_DATE),svg=document.getElementById('chartSymbol');if(!svg)return;clear(svg);const series=['SK하이닉스','삼성전자','현대차','KODEX200'],colors={'SK하이닉스':'#ff8a65','삼성전자':'#8bc34a','현대차':'#26c6da','KODEX200':'#42a5f5'},values=data.flatMap(d=>series.map(s=>d[s]||0)),minY=Math.min(-1000000,...values),maxY=Math.max(7000000,...values),w=1120,h=330,l=70,r=25,t=22,b=72;svg.setAttribute('viewBox',`0 0 ${w} ${h}`);const cfg={w,h,l,r,t,b,y:v=>t+(maxY-v)/(maxY-minY)*(h-t-b)};drawAxes(svg,cfg,[-1000000,0,1000000,2000000,3000000,4000000,5000000,6000000,7000000]);const plotW=w-l-r,n=data.length;series.forEach(s=>{const pts=data.map((d,i)=>[l+(n===1?0:i*plotW/(n-1)),cfg.y(d[s]||0)]);polyline(svg,pts,colors[s]);circles(svg,pts,colors[s])});labelDates(svg,cfg,data)}function drawStacked(){const data=allocHistory(ACTIVE_DATE),svg=document.getElementById('chartAlloc');if(!svg)return;clear(svg);const values=data.map(d=>d.ETF+d.개별주식+d.현금),maxY=Math.max(30000000,...values)*1.05,w=1120,h=330,l=70,r=25,t=22,b=72;svg.setAttribute('viewBox',`0 0 ${w} ${h}`);const cfg={w,h,l,r,t,b,y:v=>t+(maxY-v)/maxY*(h-t-b)};drawAxes(svg,cfg,[0,5000000,10000000,15000000,20000000,25000000,30000000]);const plotW=w-l-r,n=data.length,bw=plotW/Math.max(n,1)*.7;data.forEach((d,i)=>{const x=l+(n===1?0:i*plotW/(n-1))-bw/2;let base=0;[['ETF','#ff6b6b'],['개별주식','#ffc857'],['현금','#8fd18f']].forEach(([key,color])=>{const yTop=cfg.y(base+d[key]),yBase=cfg.y(base);svg.appendChild(el('rect',{x,y:yTop,width:bw,height:yBase-yTop,fill:color,opacity:.75,stroke:'#fff'}));base+=d[key]})});labelDates(svg,cfg,data)}function drawAllCharts(){drawCumChart();drawLineChart();drawStacked()}
async function boot(){[PORTFOLIO,PRICES]=await Promise.all([fetch('data/portfolio.json?ts='+Date.now()).then(r=>r.json()),fetch('data/prices.json?ts='+Date.now()).then(r=>r.json())]);const displayDates=Object.keys(PRICES).filter(d=>PRICES[d].display!==false).sort(byDate),hash=location.hash.replace('#','');ACTIVE_DATE=displayDates.includes(hash)?hash:displayDates.at(-1);render();document.getElementById('tabs').addEventListener('click',e=>{const a=e.target.closest('.date-link');if(!a)return;e.preventDefault();ACTIVE_DATE=a.dataset.date;history.replaceState(null,'','#'+ACTIVE_DATE);render()})}boot().catch(err=>{document.getElementById('app').innerHTML=`<div class="wrap"><div class="note"><h2>데이터 로딩 오류</h2><pre>${String(err)}</pre></div></div>`})
</script></body></html>
