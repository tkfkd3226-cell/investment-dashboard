<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>투자 성과 대시보드</title>
<style>:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --ink:#172033;
  --muted:#6b7280;
  --line:#d7dce5;
  --blue:#1f5eff;
  --green:#16a34a;
  --red:#dc2626;
  --amber:#d97706;
  --navy:#0f172a;
  --soft-blue:#eaf2ff;
  --soft-green:#eaf7ee;
  --soft-red:#fff1f1;
  --soft-amber:#fff7e6;
  --soft-purple:#f4efff;
  --soft-gray:#eef1f5;
  --black:#111827;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.45;
}

.wrap{
  max-width:1680px;
  margin:0 auto;
  padding:24px;
}

.hero{
  background:linear-gradient(135deg,#111827 0%,#1f2937 50%,#0f172a 100%);
  color:#fff;
  border-radius:22px;
  padding:28px 30px;
  box-shadow:0 16px 40px rgba(15,23,42,.22);
  position:relative;
  overflow:hidden;
}

.hero:after{
  content:"";
  position:absolute;
  right:-110px;
  top:-80px;
  width:330px;
  height:330px;
  border-radius:999px;
  background:rgba(59,130,246,.25);
}

.hero h1{
  margin:0 0 8px;
  font-size:30px;
  letter-spacing:-.04em;
}

.hero p{
  margin:0;
  color:#d1d5db;
  font-size:15px;
}

.grid{
  display:grid;
  gap:16px;
}

.cards{
  grid-template-columns:repeat(4,minmax(0,1fr));
  margin-top:18px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
}

.card.dark{
  background:#111827;
  color:white;
  border-color:#111827;
}

.label{
  font-size:13px;
  color:var(--muted);
  font-weight:700;
  margin-bottom:7px;
}

.dark .label{
  color:#cbd5e1;
}

.value{
  font-size:28px;
  font-weight:900;
  letter-spacing:-.04em;
}

.sub{
  font-size:13px;
  color:var(--muted);
  margin-top:5px;
}

.dark .sub{
  color:#cbd5e1;
}

.positive{
  color:var(--green) !important;
}

.negative{
  color:var(--red) !important;
}

.blue{
  color:var(--blue) !important;
}

section{
  margin-top:22px;
}

.section-title{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin:0 0 12px;
}

.section-title h2{
  margin:0;
  font-size:22px;
  letter-spacing:-.04em;
}

.section-title p{
  margin:0;
  color:var(--muted);
  font-size:13px;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:13px;
  background:white;
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
}

th, td{
  padding:9px 10px;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  vertical-align:middle;
}

th:last-child, td:last-child{
  border-right:0;
}

tr:last-child td{
  border-bottom:0;
}

thead th{
  background:#f1f5f9;
  color:#111827;
  font-weight:900;
  text-align:center;
  white-space:nowrap;
}

td.num{
  text-align:right;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}

.small{
  font-size:12px;
  color:var(--muted);
}

.ticker-samsung{
  background:#fff3d0;
}

.ticker-sk{
  background:#ffe3e3;
}

.ticker-hyundai{
  background:#e3f2ff;
}

.ticker-kodex{
  background:#e9f7e9;
}

.ticker-mini{
  background:#f0f2f5;
}

.summary-row td{
  background:#f8fafc;
  font-weight:900;
}

.hold-row td{
  font-weight:800;
}

.note{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
}

.note strong{
  color:#111827;
}

.three{
  grid-template-columns:repeat(3,minmax(0,1fr));
}

.pillbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}

.pill{
  padding:7px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  font-size:13px;
  color:#f3f4f6;
}

.mobile-scroll{
  overflow:auto;
  border-radius:16px;
}

.mobile-scroll table{
  min-width:980px;
}

.mini-card{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}

.mini-card .m-label{
  font-size:12px;
  color:var(--muted);
  font-weight:800;
}

.mini-card .m-value{
  font-size:19px;
  font-weight:900;
  margin-top:2px;
}

.pension-band{
  background:linear-gradient(135deg,#ecfdf5 0%,#eff6ff 52%,#fff7ed 100%);
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
}

.bar-box{
  height:12px;
  background:#eef2f7;
  border-radius:999px;
  overflow:hidden;
  border:1px solid #dbe2ec;
}

.bar-fill{
  height:100%;
  border-radius:999px;
}

.bar-gray{
  background:#94a3b8;
}

.chart-hover-line{
  pointer-events:none;
}

.svg-hitbox{
  fill:transparent;
  cursor:crosshair;
}

.dash-tooltip{
  position:fixed;
  z-index:9999;
  min-width:210px;
  max-width:320px;
  background:rgba(15,23,42,.96);
  color:#fff;
  border:1px solid rgba(255,255,255,.16);
  border-radius:12px;
  padding:10px 12px;
  box-shadow:0 16px 36px rgba(0,0,0,.28);
  font-size:12px;
  line-height:1.5;
  pointer-events:none;
  opacity:0;
  transform:translate(-50%,-110%);
  transition:opacity .08s ease;
}

.dash-tooltip.visible{
  opacity:1;
}

.dash-tooltip .tt-date{
  font-weight:900;
  font-size:13px;
  margin-bottom:6px;
  color:#fff;
}

.dash-tooltip .tt-row{
  display:flex;
  justify-content:space-between;
  gap:16px;
  white-space:nowrap;
}

.dash-tooltip .tt-name{
  color:#cbd5e1;
}

.dash-tooltip .tt-val{
  font-weight:800;
  color:#fff;
}

.dash-tooltip .tt-pos{
  color:#86efac;
}

.dash-tooltip .tt-neg{
  color:#fca5a5;
}

.chart-grid{
  grid-template-columns:1fr;
  gap:18px;
}

.chart-card{
  position:relative;
  overflow:hidden;
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
}

.chart-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}

.chart-head h3{
  margin:0;
  font-size:18px;
  letter-spacing:-.03em;
}

.chart-head p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:12px;
}

.chart-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}

svg.chart{
  width:100%;
  min-width:960px;
  height:330px;
  display:block;
  background:#fff;
  border-radius:12px;
}

.chart-legend{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-top:10px;
  font-size:12px;
  color:#555;
}

.legend-item{
  display:inline-flex;
  align-items:center;
  gap:5px;
}

.swatch{
  width:12px;
  height:12px;
  border-radius:3px;
  display:inline-block;
}

.chart-note{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
  width:100%;
  min-width:0;
  margin-top:12px;
}

.chart-note .mini-card{
  background:#f8fafc;
}

@media (max-width:900px){
  .chart-note{
    grid-template-columns:1fr 1fr;
  }
}

@media (max-width:1100px){
  .cards, .three, .two{
    grid-template-columns:1fr;
  }

  .value{
    font-size:24px;
  }

  .wrap{
    padding:14px;
  }
}

@media print{
  body{
    background:white;
  }

  .card, .note, .hero, table{
    box-shadow:none;
  }

  .wrap{
    max-width:none;
    padding:8px;
  }
}

.two{
  grid-template-columns:minmax(0,1.1fr) minmax(0,.9fr);
  width:100%;
}

.two > *, .pension-detail-grid > *, .chart-card, .chart-wrap{
  min-width:0;
}

.pension-detail-grid{
  width:100%;
  align-items:stretch;
}

.pension-detail-grid .note{
  width:100%;
  height:100%;
}

.pension-detail-grid .mobile-scroll{
  width:100%;
  min-width:0;
}

.pension-change-note{
  overflow:hidden;
}

.change-kpis{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:10px;
}

.change-table-wrap{
  width:100%;
  overflow-x:auto;
  border-radius:12px;
  margin-top:12px;
  -webkit-overflow-scrolling:touch;
}

.change-table{
  min-width:0 !important;
  table-layout:fixed;
  font-size:12px !important;
  margin:0 !important;
  border-radius:12px !important;
}

.change-table th:nth-child(1){
  width:25%;
}

.change-table th:nth-child(2), .change-table th:nth-child(3){
  width:28%;
}

.change-table th:nth-child(4){
  width:19%;
}

.change-price{
  display:block;
  font-weight:800;
  white-space:nowrap;
}

.change-eval{
  display:block;
  margin-top:2px;
  color:var(--muted);
  font-size:11px;
  white-space:nowrap;
}

.change-mobile-list{
  display:none;
}

.change-product-card{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:14px;
  padding:13px;
}

.change-product-title{
  font-size:14px;
  font-weight:900;
  margin-bottom:9px;
  color:#111827;
}

.change-product-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  padding:5px 0;
  border-top:1px dashed #dbe2ec;
  font-size:12px;
}

.change-product-row:first-of-type{
  border-top:0;
}

.change-product-label{
  color:var(--muted);
  font-weight:700;
}

.change-product-value{
  text-align:right;
  font-weight:800;
  font-variant-numeric:tabular-nums;
}

@media (max-width:1100px){
  .pension-detail-grid{
    grid-template-columns:1fr;
  }
}

@media (max-width:700px){
  .change-kpis{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .desktop-change-table{
    display:none;
  }

  .change-mobile-list{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-top:12px;
  }

  .chart-note{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .chart-note .mini-card{
    min-width:0;
  }

  .chart-note .m-value{
    overflow-wrap:anywhere;
  }

  svg.chart{
    min-width:760px;
  }
}

@media (max-width:420px){
  .change-kpis{
    grid-template-columns:1fr;
  }

  .chart-note{
    grid-template-columns:1fr;
  }

  .mini-card .m-value{
    font-size:18px;
  }
}

.result-summary-grid > .note{
  min-width:0;
  width:100%;
}

.result-summary-grid .kpi-mini, .result-summary-grid .mini-card{
  min-width:0;
}

.result-summary-grid .m-value{
  word-break:keep-all;
  overflow-wrap:normal;
  font-variant-numeric:tabular-nums;
}

@media (max-width:520px){
  
.result-summary-grid 
.result-summary-grid .m-value{
    font-size:clamp(16px,4.5vw,19px);
  }
}

@media (min-width:1101px) and (max-width:1250px){
  .pension-detail-grid{
    grid-template-columns:1fr !important;
  }

  .pension-products-note .mobile-scroll table{
    min-width:0 !important;
    width:100% !important;
  }
}

.scroll-hint{
  display:none;
}

.mobile-scroll.is-scrollable, .chart-wrap.is-scrollable{
  box-shadow:inset -20px 0 18px -22px rgba(15,23,42,.8);
}

@media (max-width:900px){
  .scroll-hint{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:6px;
    margin:0 2px 7px;
    color:#475569;
    font-size:12px;
    font-weight:800;
  }

  .scroll-hint::before{
    content:"↔";
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:24px;
    height:24px;
    border-radius:999px;
    background:#e2e8f0;
    color:#0f172a;
    font-size:14px;
  }

  .mobile-scroll.is-scrollable, .chart-wrap.is-scrollable{
    border-right:3px solid #94a3b8;
  }
}

.symbol-summary-grid .mini-card{
  padding:14px;
}

.symbol-summary-grid .m-value{
  margin-top:4px;
  margin-bottom:10px;
  white-space:nowrap;
}

.symbol-metrics{
  display:grid;
  gap:6px;
  padding-top:9px;
  border-top:1px solid var(--line);
}

.symbol-metric{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  min-width:0;
}

.symbol-metric-label{
  color:var(--muted);
  font-size:11px;
  font-weight:800;
}

.symbol-metric-value{
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
}

.symbol-summary-note{
  margin-top:8px;
  color:var(--muted);
  font-size:11px;
}

@media (max-width:520px){
  .symbol-metric{
    align-items:flex-start;
    flex-direction:column;
    gap:1px;
  }
}

.change-table tbody td:nth-child(4){
  text-align:right !important;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
}

@media (max-width:900px){
  .combined-performance-table, .account-summary-table{
    width:max-content !important;
    min-width:max-content !important;
    table-layout:auto !important;
    font-size:12px !important;
  }

  .combined-performance-table th, .combined-performance-table td, .account-summary-table th, .account-summary-table td{
    padding:7px 8px !important;
    white-space:nowrap;
  }

  .combined-performance-table th:first-child, .combined-performance-table td:first-child{
    min-width:112px;
  }

  .account-summary-table th:last-child, .account-summary-table td:last-child{
    min-width:165px;
    max-width:210px;
    white-space:normal;
    line-height:1.4;
  }
}

@media (max-width:900px){
  .pension-products-table{
    width:max-content !important;
    min-width:max-content !important;
    table-layout:auto !important;
    font-size:11px !important;
  }

  .pension-products-table th, .pension-products-table td{
    padding:6px 7px !important;
    white-space:nowrap !important;
  }

  .pension-products-table th:nth-child(2), .pension-products-table td:nth-child(2){
    min-width:42px !important;
  }

  .pension-products-table th:nth-child(3), .pension-products-table td:nth-child(3){
    min-width:68px !important;
  }

  .pension-products-table th:nth-child(4), .pension-products-table td:nth-child(4), .pension-products-table th:nth-child(5), .pension-products-table td:nth-child(5), .pension-products-table th:nth-child(6), .pension-products-table td:nth-child(6){
    min-width:88px !important;
  }

  .pension-products-table th:nth-child(7), .pension-products-table td:nth-child(7){
    min-width:62px !important;
  }

  .pension-products-table th:nth-child(8), .pension-products-table td:nth-child(8){
    min-width:78px !important;
  }

  .pension-products-table .bar-box{
    width:64px !important;
    min-width:64px !important;
  }
}

@media (max-width:900px){
  .pension-products-table th:first-child, .pension-products-table td:first-child, .combined-performance-table th:first-child, .combined-performance-table td:first-child, .account-summary-table th:first-child, .account-summary-table td:first-child, .hold-position-table th:first-child, .hold-position-table td:first-child{
    position:sticky;
    left:0;
    z-index:3;
    box-shadow:8px 0 10px -10px rgba(15,23,42,.35);
    background-clip:padding-box;
  }

  .pension-products-table thead th:first-child, .combined-performance-table thead th:first-child, .account-summary-table thead th:first-child, .hold-position-table thead th:first-child{
    background:#f1f5f9 !important;
    z-index:5;
  }

  .pension-products-table tbody td:first-child{
    background:#fff !important;
    z-index:2;
  }

  .pension-products-table tbody tr.summary-row td:first-child{
    background:#f8fafc !important;
    z-index:4;
  }

  .combined-performance-table tbody td:first-child, .account-summary-table tbody td:first-child{
    background:#fff !important;
    z-index:2;
  }

  .combined-performance-table tbody tr.summary-row td:first-child, .account-summary-table tbody tr.summary-row td:first-child{
    background:#f8fafc !important;
    z-index:4;
  }

  .hold-position-table tbody td:first-child{
    background:#fff !important;
    z-index:2;
  }

  .hold-position-table tbody tr.ticker-samsung td:first-child{
    background:#fff3d0 !important;
  }

  .hold-position-table tbody tr.ticker-sk td:first-child{
    background:#ffe3e3 !important;
  }

  .hold-position-table tbody tr.ticker-hyundai td:first-child{
    background:#e3f2ff !important;
  }

  .hold-position-table tbody tr.ticker-kodex td:first-child{
    background:#e9f7e9 !important;
  }

  .hold-position-table tbody tr.ticker-mini td:first-child{
    background:#f0f2f5 !important;
  }

  .hold-position-table tbody tr.summary-row td:first-child{
    background:#f8fafc !important;
    z-index:4;
  }
}

@media (max-width:900px){
  .pension-products-table, .combined-performance-table, .account-summary-table, .hold-position-table{
    overflow:visible !important;
  }
}

@media (min-width:1251px){
  .pension-detail-grid{
    grid-template-columns:minmax(0,1.56fr) minmax(480px,.72fr);
  }

  .pension-products-note .mobile-scroll{
    overflow:visible;
  }

  .pension-products-note .mobile-scroll table{
    min-width:0;
    width:100%;
    table-layout:fixed;
    font-size:12px;
  }

  .pension-products-note th, .pension-products-note td{
    padding:8px 7px;
  }

  .pension-products-note th:nth-child(1){
    width:20%;
  }

  .pension-products-note th:nth-child(2){
    width:7%;
  }

  .pension-products-note th:nth-child(3){
    width:10%;
  }

  .pension-products-note th:nth-child(4){
    width:14%;
  }

  .pension-products-note th:nth-child(5){
    width:14%;
  }

  .pension-products-note th:nth-child(6){
    width:14%;
  }

  .pension-products-note th:nth-child(7){
    width:13%;
  }

  .pension-products-note th:nth-child(8){
    width:8%;
  }

  .pension-products-note th:first-child, .pension-products-note td:first-child{
    white-space:nowrap;
  }

  .change-table{
    table-layout:fixed;
    font-size:11px;
  }

  .change-table th:nth-child(1), .change-table td:nth-child(1){
    width:28%;
    white-space:nowrap;
    font-size:10.8px;
    letter-spacing:-.03em;
  }

  .change-table th:nth-child(2), .change-table td:nth-child(2), .change-table th:nth-child(3), .change-table td:nth-child(3), .change-table th:nth-child(4), .change-table td:nth-child(4){
    width:24%;
  }
}

.chart-note.six{
  grid-template-columns:repeat(6,minmax(0,1fr)) !important;
}

.chart-note.six 
.chart-note.six .m-detail{
  margin-top:5px;

<script>

const allAvailableDates=()=>Array.from(new Set([...(Object.keys(ACCOUNT1_DAILY||{})),...(Object.keys(PRICES||{}).filter(d=>PRICES[d].display!==false))])).sort(byDate);

const basisText=d=>{

function previousDate(date){return allAvailableDates().filter(d=>d<date).sort(byDate).at(-1)||null}function getPrice(s,section,ticker){return s?.[section]?.[ticker]??null}
function calc(date){
  const p=PORTFOLIO,c=p.constants,s=PRICES[date]||{},pk=previousDate(date),prev=pk?PRICES[pk]:null,daily=ACCOUNT1_DAILY?.[date]||null,extraPensionContrib=pensionContributionSum(date),prevExtraPensionContrib=pk?pensionContributionSum(pk):0,pensionPrincipal=(Number(c.pensionContributionPrincipal)||0)+extraPensionContrib;
  const account2Included=includeAccount2(date),tossIncluded=includeToss(date),hasPension=hasPensionData(date);

    const prevDaily=pk?ACCOUNT1_DAILY?.[pk]:null;

      const prevH=prevDaily?.holdings?.find(v=>v.name===h.name),prevProfit=prevH?prevH.profit:null,dayChange=prevH==null?null:h.profit-prevH.profit;
      return {...h,feeAdjustedProfit:h.profit,returnRate:h.cost?h.profit/h.cost*100:0,prevPrice:prevH?.price??null,prevProfit,dayChange};

    securitiesCash=c.securitiesCash;

  const tossProfit=tossIncluded?c.tossProfit:0,tossRealizedAmount=tossIncluded?c.tossRealizedAmount:0,tossRemainder=tossIncluded?c.tossRealizedAmount-c.tossReinvestedToAccount1:0;

  const basePensionCash=hasPension?Number(s?.pension?.cash||0):0,basePrevPensionCash=Number(prev?.pension?.cash||0),pensionCash=hasPension?basePensionCash+extraPensionContrib:0,prevPensionCash=basePrevPensionCash+prevExtraPensionContrib,pensionEval=hasPension?pensionRows.reduce((a,r)=>a+r.evalAmount,0)+pensionCash:0,pensionPrevEval=hasPension&&prev?pensionRows.reduce((a,r)=>a+(r.prevEval||0),0)+prevPensionCash:null,pensionProfit=hasPension?pensionEval-pensionPrincipal:0,pensionReturn=hasPension&&pensionPrincipal?pensionProfit/pensionPrincipal*100:0;

function calcMdd(cum){

  }
  return {drop:maxDrop,from,to};
}

  addHover(svg,cfg,data,d=>{const total=d.ETF+d.개별주식+d.현금;return `<div class="tt-date">${d['날짜']}</div>`+row('ETF',fmt(d.ETF)+`원 (${(d.ETF/total*100).toFixed(1)}%)`)+row('개별주식',fmt(d.개별주식)+`원 (${(d.개별주식/total*100).toFixed(1)}%)`)+row('현금',fmt(d.현금)+`원 (${(d.현금/total*100).toFixed(1)}%)`)+'<div style="height:6px"></div>'+row('합계',fmt(total)+'원')});
}
function refreshScrollHints(){
  document.querySelectorAll('.mobile-scroll, .chart-wrap').forEach(wrap=>{
    const prev=wrap.previousElementSibling;
    if(prev&&prev.classList.contains('scroll-hint'))prev.remove();
    const scrollable=wrap.scrollWidth>wrap.clientWidth+4;
    wrap.classList.toggle('is-scrollable',scrollable);
    if(scrollable){const hint=document.createElement('div');hint.className='scroll-hint';hint.textContent='좌우로 밀어 더 보기';wrap.parentNode.insertBefore(hint,wrap)}
  });
}

function openPensionContributionModal(){
  const modal=document.getElementById('pensionContribModal');
  if(!modal) return;
  modal.classList.add('show');
  modal.setAttribute('aria-hidden','false');
  setTimeout(()=>document.getElementById('pensionContribDate')?.focus(),0);
}
function closePensionContributionModal(){
  const modal=document.getElementById('pensionContribModal');
  if(!modal) return;
  modal.classList.remove('show');
  modal.setAttribute('aria-hidden','true');
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closePensionContributionModal();
});

function cleanNumberInput(v){
  return Number(String(v||'').replace(/[^\d.-]/g,''));
}
function buildPensionContributionItem(){
  const dateEl=document.getElementById('pensionContribDate');
  const amountEl=document.getElementById('pensionContribAmount');
  const memoEl=document.getElementById('pensionContribMemo');
  if(!dateEl||!amountEl||!memoEl) throw new Error('입력칸을 찾지 못했어.');
  const date=dateEl.value;
  const amount=cleanNumberInput(amountEl.value);
  const memo=memoEl.value.trim()||defaultPensionContributionMemo(date);
  if(!date) throw new Error('일자를 입력해줘.');
  if(!amount || amount<=0) throw new Error('금액을 입력해줘.');
  return {date,source:'company',amount,memo};
}
function showPensionContributionStatus(message,type='ok'){
  const status=document.getElementById('pensionContribStatus');
  if(!status) return;
  status.textContent=message;
  status.className=`contrib-status show ${type}`;
}
function generatePensionContributionJson(){
  const out=document.getElementById('pensionContribOutput');
  if(!out) return;
  try{
    const item=buildPensionContributionItem();
    out.textContent=JSON.stringify(item,null,2);
    out.classList.add('show');
    showPensionContributionStatus('JSON 생성 완료. 수동 반영이 필요하면 복사해서 contributions 안에 추가하면 돼.','ok');
  }catch(e){
    out.textContent=e.message||String(e);
    out.classList.add('show');
    showPensionContributionStatus(e.message||String(e),'err');
  }
}
async function copyPensionContributionJson(){
  const out=document.getElementById('pensionContribOutput');
  if(!out) return;
  if(!out.textContent.trim() || out.textContent.includes('복사 완료')) generatePensionContributionJson();
  if(!out.textContent.trim()) return;
  const text=out.textContent.replace(/\n\n복사 완료$/,'');
  try{
    await navigator.clipboard.writeText(text);
    out.textContent=text + '\n\n복사 완료';
    showPensionContributionStatus('복사 완료.','ok');
  }catch(e){
    showPensionContributionStatus('복사는 브라우저 권한 때문에 실패. 위 내용을 직접 선택해서 복사해줘.','err');
  }
}
async function savePensionContribution(){
  const out=document.getElementById('pensionContribOutput');
  const pinEl=document.getElementById('pensionContribPin');
  try{
    const item=buildPensionContributionItem();
    if(out){
      out.textContent=JSON.stringify(item,null,2);
      out.classList.add('show');
    }
    showPensionContributionStatus('저장 중... GitHub 파일을 업데이트하고 있어.','ok');
    const res=await fetch('/.netlify/functions/save-pension-contribution',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pin:pinEl?.value||'',action:'upsert',item})
    });
    const data=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error||`저장 실패 (${res.status})`);
    const action=data.action==='updated'?'기존 항목 수정':'신규 항목 추가';
    showPensionContributionStatus(`${action} 완료. Netlify 재배포가 끝나면 화면에 반영돼. commit: ${data.commitSha||'-'}`,'ok');
  }catch(e){
    showPensionContributionStatus(e.message||String(e),'err');
  }
}


async function deleteSelectedPensionContribution(){
  const selected=document.querySelector('input[name="pensionContribDeleteTarget"]:checked');
  const pinEl=document.getElementById('pensionContribPin');
  if(!selected){
    showPensionContributionStatus('삭제할 항목을 선택해줘.','err');
    return;
  }
  const [date,source]=selected.value.split('|');
  const item=pensionContributionItems().find(v=>v.date===date&&(v.source||'company')===source);
  const amount=item?won(Number(item.amount)||0):'선택 항목';
  if(!confirm(`${date} / ${amount} 항목을 삭제할까요?\n삭제하면 GitHub에 커밋되고 Netlify 재배포 후 반영됩니다.`)) return;
  try{
    showPensionContributionStatus('삭제 중... GitHub 파일을 업데이트하고 있어.','ok');
    const res=await fetch('/.netlify/functions/save-pension-contribution',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pin:pinEl?.value||'',action:'delete',date,source})
    });
    const data=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error||`삭제 실패 (${res.status})`);
    showPensionContributionStatus(`선택 항목 삭제 완료. Netlify 재배포가 끝나면 화면에 반영돼. commit: ${data.commitSha||'-'}`,'ok');
  }catch(e){
    showPensionContributionStatus(e.message||String(e),'err');
  }
}
