function fmt(n) {
  return Math.round(n).toLocaleString('ko-KR');
}
function pct(n) {
  return Number(n).toFixed(2) + '%';
}
function signed(n, suffix='') {
  const s = (n > 0 ? '+' : '') + fmt(n) + suffix;
  return s;
}
function clear(svg) { while(svg.firstChild) svg.removeChild(svg.firstChild); }
function el(name, attrs={}) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', name);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}
function tooltip() {
  return document.getElementById('dashTooltip');
}
function showTooltip(evt, html) {
  const tt = tooltip();
  tt.innerHTML = html;
  tt.classList.add('visible');
  const pad = 14;
  let x = evt.clientX;
  let y = evt.clientY - 12;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
  requestAnimationFrame(() => {
    const r = tt.getBoundingClientRect();
    if (r.right > window.innerWidth - pad) tt.style.left = (window.innerWidth - pad - r.width/2) + 'px';
    if (r.left < pad) tt.style.left = (pad + r.width/2) + 'px';
    if (r.top < pad) {
      tt.style.transform = 'translate(-50%, 18px)';
      tt.style.top = evt.clientY + 'px';
    } else {
      tt.style.transform = 'translate(-50%,-110%)';
    }
  });
}
function hideTooltip() {
  tooltip().classList.remove('visible');
}
function row(name, val, cls='') {
  return `<div class="tt-row"><span class="tt-name">${name}</span><span class="tt-val ${cls}">${val}</span></div>`;
}
function clsBy(n) { return n < 0 ? 'tt-neg' : (n > 0 ? 'tt-pos' : ''); }

function drawAxes(svg, cfg, yTicks, y2Ticks=null) {
  const {w,h,l,r,t,b} = cfg;
  svg.appendChild(el('rect', {x:0,y:0,width:w,height:h,fill:'#fff'}));
  for (const tick of yTicks) {
    const y = cfg.y(tick);
    svg.appendChild(el('line', {x1:l,y1:y,x2:w-r,y2:y,stroke:'#e5e7eb','stroke-width':1}));
    const tx=el('text',{x:l-10,y:y+4,'text-anchor':'end','font-size':11,fill:'#6b7280'});
    tx.textContent = fmt(tick);
    svg.appendChild(tx);
  }
  svg.appendChild(el('line',{x1:l,y1:t,x2:l,y2:h-b,stroke:'#cbd5e1'}));
  svg.appendChild(el('line',{x1:l,y1:h-b,x2:w-r,y2:h-b,stroke:'#cbd5e1'}));
  if (y2Ticks) {
    for (const tick of y2Ticks) {
      const y = cfg.y2(tick);
      const tx=el('text',{x:w-r+10,y:y+4,'text-anchor':'start','font-size':11,fill:'#6b7280'});
      tx.textContent = tick.toFixed(0)+'%';
      svg.appendChild(tx);
    }
    svg.appendChild(el('line',{x1:w-r,y1:t,x2:w-r,y2:h-b,stroke:'#cbd5e1'}));
  }
}
function labelDates(svg, cfg, data, every=3) {
  const {w,h,l,r,t,b}=cfg, plotW=w-l-r;
  data.forEach((d,i)=> {
    if (i % every === 0 || i === data.length-1) {
      const x = l + i * plotW/(data.length-1);
      const txt=el('text',{x:x,y:h-b+32,transform:`rotate(-65 ${x} ${h-b+32})`,'text-anchor':'end','font-size':10,fill:'#6b7280'});
      txt.textContent = d['날짜'];
      svg.appendChild(txt);
    }
  });
}
function polyline(svg, points, color, width=2.5) {
  svg.appendChild(el('polyline',{points:points.map(p=>p.join(',')).join(' '),fill:'none',stroke:color,'stroke-width':width,'stroke-linejoin':'round','stroke-linecap':'round'}));

function signed(n, suffix='') {
  const s = (n > 0 ? '+' : '') + fmt(n) + suffix;
  return s;
}
function clear(svg) { while(svg.firstChild) svg.removeChild(svg.firstChild); }
function el(name, attrs={}) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', name);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}
function tooltip() {
  return document.getElementById('dashTooltip');
}
function showTooltip(evt, html) {
  const tt = tooltip();
  tt.innerHTML = html;
  tt.classList.add('visible');
  const pad = 14;
  let x = evt.clientX;
  let y = evt.clientY - 12;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
  requestAnimationFrame(() => {
    const r = tt.getBoundingClientRect();
    if (r.right > window.innerWidth - pad) tt.style.left = (window.innerWidth - pad - r.width/2) + 'px';
    if (r.left < pad) tt.style.left = (pad + r.width/2) + 'px';
    if (r.top < pad) {
      tt.style.transform = 'translate(-50%, 18px)';
      tt.style.top = evt.clientY + 'px';
    } else {
      tt.style.transform = 'translate(-50%,-110%)';
    }
  });
}
function hideTooltip() {
  tooltip().classList.remove('visible');
}
function row(name, val, cls='') {
  return `<div class="tt-row"><span class="tt-name">${name}</span><span class="tt-val ${cls}">${val}</span></div>`;
}
function clsBy(n) { return n < 0 ? 'tt-neg' : (n > 0 ? 'tt-pos' : ''); }

function drawAxes(svg, cfg, yTicks, y2Ticks=null) {
  const {w,h,l,r,t,b} = cfg;
  svg.appendChild(el('rect', {x:0,y:0,width:w,height:h,fill:'#fff'}));
  for (const tick of yTicks) {
    const y = cfg.y(tick);
    svg.appendChild(el('line', {x1:l,y1:y,x2:w-r,y2:y,stroke:'#e5e7eb','stroke-width':1}));
    const tx=el('text',{x:l-10,y:y+4,'text-anchor':'end','font-size':11,fill:'#6b7280'});
    tx.textContent = fmt(tick);
    svg.appendChild(tx);
  }
  svg.appendChild(el('line',{x1:l,y1:t,x2:l,y2:h-b,stroke:'#cbd5e1'}));
  svg.appendChild(el('line',{x1:l,y1:h-b,x2:w-r,y2:h-b,stroke:'#cbd5e1'}));
  if (y2Ticks) {
    for (const tick of y2Ticks) {
      const y = cfg.y2(tick);
      const tx=el('text',{x:w-r+10,y:y+4,'text-anchor':'start','font-size':11,fill:'#6b7280'});
      tx.textContent = tick.toFixed(0)+'%';
      svg.appendChild(tx);
    }
    svg.appendChild(el('line',{x1:w-r,y1:t,x2:w-r,y2:h-b,stroke:'#cbd5e1'}));
  }
}
function labelDates(svg, cfg, data, every=3) {
  const {w,h,l,r,t,b}=cfg, plotW=w-l-r;
  data.forEach((d,i)=> {
    if (i % every === 0 || i === data.length-1) {
      const x = l + i * plotW/(data.length-1);
      const txt=el('text',{x:x,y:h-b+32,transform:`rotate(-65 ${x} ${h-b+32})`,'text-anchor':'end','font-size':10,fill:'#6b7280'});
      txt.textContent = d['날짜'];
      svg.appendChild(txt);
    }
  });
}
function polyline(svg, points, color, width=2.5) {
  svg.appendChild(el('polyline',{points:points.map(p=>p.join(',')).join(' '),fill:'none',stroke:color,'stroke-width':width,'stroke-linejoin':'round','stroke-linecap':'round'}));
}
function circles(svg, points, color) {
  points.forEach(p=>svg.appendChild(el('circle',{cx:p[0],cy:p[1],r:3,fill:'#fff',stroke:color,'stroke-width':2})));
}
function nearestIndex(evt, svg, cfg, data) {
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  const ctm = svg.getScreenCTM().inverse();
  const loc = pt.matrixTransform(ctm);
  const plotW = cfg.w - cfg.l - cfg.r;
  let idx = Math.round((loc.x - cfg.l) / plotW * (data.length - 1));
  idx = Math.max(0, Math.min(data.length - 1, idx));
  return idx;
}
function addHover(svg, cfg, data, renderHtml) {
  const line = el('line',{x1:cfg.l,y1:cfg.t,x2:cfg.l,y2:cfg.h-cfg.b,stroke:'#334155','stroke-width':1.2,'stroke-dasharray':'4 4',opacity:0,class:'chart-hover-line'});
  svg.appendChild(line);
  const hit = el('rect',{x:cfg.l,y:cfg.t,width:cfg.w-cfg.l-cfg.r,height:cfg.h-cfg.t-cfg.b,class:'svg-hitbox'});
  svg.appendChild(hit);
  hit.addEventListener('mousemove', evt => {
    const idx = nearestIndex(evt, svg, cfg, data);
    const x = cfg.l + idx * (cfg.w-cfg.l-cfg.r)/(data.length-1);
    line.setAttribute('x1',x); line.setAttribute('x2',x); line.setAttribute('opacity',1);
    showTooltip(evt, renderHtml(data[idx], idx));
  });
  hit.addEventListener('mouseleave', () => {
    line.setAttribute('opacity',0);
    hideTooltip();
  });
}

function drawCumChart() {
  const svg=document.getElementById('chartCum'); clear(svg);
  const w=1120,h=330,l=70,r=70,t=22,b=72; svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  const vals = cumData.flatMap(d=>[d['합계 : 누적손익'], d['합계 : 전일대비손익']]);
  const minY = Math.min(-4000000, Math.min(...vals));
  const maxY = Math.max(12000000, Math.max(...vals));
  const minR = -20, maxR = 80;
  const cfg={w,h,l,r,t,b,
    y:v=> t+(maxY-v)/(maxY-minY)*(h-t-b),
    y2:v=> t+(maxR-v)/(maxR-minR)*(h-t-b)
  };
  drawAxes(svg,cfg,[-4000000,-2000000,0,2000000,4000000,6000000,8000000,10000000,12000000],[-20,0,20,40,60,80]);
  const plotW=w-l-r, n=cumData.length, gap=plotW/n, bw=gap*0.28;
  cumData.forEach((d,i)=> {
    const x = l + i*plotW/(n-1);
    const zero = cfg.y(0);
    const cp = cfg.y(d['합계 : 누적손익']);
    svg.appendChild(el('rect',{x:x-bw-1,y:Math.min(cp,zero),width:bw,height:Math.abs(zero-cp),fill:'#ffb84d',opacity:.8}));
    const day = cfg.y(d['합계 : 전일대비손익']);
    svg.appendChild(el('rect',{x:x+2,y:Math.min(day,zero),width:bw,height:Math.abs(zero-day),fill:d['합계 : 전일대비손익']>=0?'#a7d7a8':'#c7e6c8',stroke:d['합계 : 전일대비손익']<0?'#86b58a':'none',opacity:.9}));
  });
  const pts=cumData.map((d,i)=>[l+i*plotW/(n-1), cfg.y2(d['합계 : 누적수익률'])]);
  polyline(svg,pts,'#5abdf2',2.5); circles(svg,pts,'#5abdf2');
  labelDates(svg,cfg,cumData,3);
  addHover(svg, cfg, cumData, d => {
    return `<div class="tt-date">${d['날짜']}</div>` +
      row('누적손익', signed(d['합계 : 누적손익'],'원'), clsBy(d['합계 : 누적손익'])) +
      row('누적수익률', pct(d['합계 : 누적수익률']), clsBy(d['합계 : 누적수익률'])) +
      row('전일대비손익', signed(d['합계 : 전일대비손익'],'원'), clsBy(d['합계 : 전일대비손익']));
  });
}

function drawLineChart(svgId, data, series, yTicks, minY, maxY, colors) {
  const svg=document.getElementById(svgId); clear(svg);
  const w=1120,h=330,l=70,r=25,t=22,b=72; svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  const cfg={w,h,l,r,t,b,y:v=>t+(maxY-v)/(maxY-minY)*(h-t-b)};
  drawAxes(svg,cfg,yTicks);
  const plotW=w-l-r, n=data.length;
  series.forEach((s,idx)=> {
    const pts=data.map((d,i)=>[l+i*plotW/(n-1), cfg.y(d[s])]);
    polyline(svg,pts,colors[s],2.5); circles(svg,pts,colors[s]);
  });
  labelDates(svg,cfg,data,3);
  addHover(svg, cfg, data, d => {
    let html = `<div class="tt-date">${d['날짜']}</div>`;
    series.forEach(s => html += row(s, signed(d[s],'원'), clsBy(d[s])));
    const total = series.reduce((acc,s)=>acc+d[s],0);
    html += '<div style="height:6px"></div>' + row('4종목 합계', signed(total,'원'), clsBy(total));
    return html;
  });
}

function drawStacked() {
  const svg=document.getElementById('chartAlloc'); clear(svg);
  const w=1120,h=330,l=70,r=25,t=22,b=72; svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  const maxY=30000000, minY=0;
  const cfg={w,h,l,r,t,b,y:v=>t+(maxY-v)/(maxY-minY)*(h-t-b)};
  drawAxes(svg,cfg,[0,5000000,10000000,15000000,20000000,25000000,30000000]);
  const plotW=w-l-r, n=allocData.length, gap=plotW/n, bw=gap*.72;
  allocData.forEach((d,i)=> {
    const x=l+i*plotW/(n-1)-bw/2;
    let base=0;
    [['ETF','#ff6b6b'],['개별주식','#ffc857'],['현금','#8fd18f']].forEach(([key,color])=> {
      const yTop=cfg.y(base+d[key]), yBase=cfg.y(base);
      svg.appendChild(el('rect',{x:x,y:yTop,width:bw,height:yBase-yTop,fill:color,opacity:.75,stroke:'#fff','stroke-width':.4}));
      base += d[key];
    });
  });
  labelDates(svg,cfg,allocData,3);
  addHover(svg, cfg, allocData, d => {
    const total = d['ETF'] + d['개별주식'] + d['현금'];
    return `<div class="tt-date">${d['날짜']}</div>` +
      row('ETF', fmt(d['ETF']) + `원 (${(d['ETF']/total*100).toFixed(1)}%)`) +
      row('개별주식', fmt(d['개별주식']) + `원 (${(d['개별주식']/total*100).toFixed(1)}%)`) +
      row('현금', fmt(d['현금']) + `원 (${(d['현금']/total*100).toFixed(1)}%)`) +
      '<div style="height:6px"></div>' + row('합계', fmt(total)+'원');
  });
}

document.addEventListener('DOMContentLoaded', () => {
  drawCumChart();
  drawLineChart('chartSymbol', symbolData, ['SK하이닉스','삼성전자','현대차','KODEX200'], [-1000000,0,1000000,2000000,3000000,4000000,5000000,6000000,7000000], -1000000, 7000000, {
    'SK하이닉스':'#ff8a65','삼성전자':'#8bc34a','현대차':'#26c6da','KODEX200':'#42a5f5'
  });
  drawStacked();
});

<script>
(function(){
  function refreshScrollHints(){
    document.querySelectorAll('.mobile-scroll, .chart-wrap').forEach(function(wrap){
      var previous = wrap.previousElementSibling;
      if (previous && previous.classList.contains('scroll-hint')) {
        previous.remove();
      }
      var scrollable = wrap.scrollWidth > wrap.clientWidth + 4;
      wrap.classList.toggle('is-scrollable', scrollable);
      if (scrollable) {
        var hint = document.createElement('div');
        hint.className = 'scroll-hint';
        hint.textContent = '좌우로 밀어 더 보기';
        wrap.parentNode.insertBefore(hint, wrap);
      }
    });
  }
  document.addEventListener('DOMContentLoaded', function(){
    refreshScrollHints();
    setTimeout(refreshScrollHints, 120);
  });
  window.addEventListener('load', refreshScrollHints);
  window.addEventListener('resize', refreshScrollHints);
})();
</script>

<script>
(function() {
  const viewer = document.getElementById('viewer');
  const links = Array.from(document.querySelectorAll('.date-link'));

  function loadFromHash() {
    const hash = window.location.hash || '#2026-06-26';
    const link = links.find(a => a.getAttribute('href') === hash) || links[links.length - 1];
    links.forEach(a => a.classList.toggle('active', a === link));
    const template = document.getElementById(link.dataset.template);
    viewer.srcdoc = template ? template.innerHTML : '<!doctype html><html lang="ko"><body>대시보드를 찾을 수 없습니다.</body></html>';
  }

  window.addEventListener('hashchange', loadFromHash);
  loadFromHash();
})();
