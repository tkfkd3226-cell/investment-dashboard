function decodeHtml(encoded) {
  const binary = atob(encoded);
  const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
  return new TextDecoder("utf-8").decode(bytes);
}

function showDashboard(dateKey, updateHash = true) {
  const viewer = document.getElementById("viewer");
  const tab18 = document.getElementById("tab18");
  const tab26 = document.getElementById("tab26");

  const is18 = dateKey === "2026-06-18";
  viewer.srcdoc = decodeHtml(is18 ? dashboard18 : dashboard26);

  tab18.classList.toggle("active", is18);
  tab26.classList.toggle("active", !is18);
  tab18.setAttribute("aria-current", is18 ? "page" : "false");
  tab26.setAttribute("aria-current", !is18 ? "page" : "false");

  document.title = is18
    ? "투자 성과 대시보드 - 2026.06.18"
    : "투자 성과 대시보드 - 2026.06.26";

  if (updateHash) {
    history.replaceState(null, "", is18 ? "#2026-06-18" : "#2026-06-26");
  }
}

document.getElementById("tab18").addEventListener("click", event => {
  event.preventDefault();
  showDashboard("2026-06-18");
});

document.getElementById("tab26").addEventListener("click", event => {
  event.preventDefault();
  showDashboard("2026-06-26");
});

window.addEventListener("hashchange", () => {
  showDashboard(location.hash === "#2026-06-18" ? "2026-06-18" : "2026-06-26", false);
});

showDashboard(location.hash === "#2026-06-18" ? "2026-06-18" : "2026-06-26", false);
</script>
